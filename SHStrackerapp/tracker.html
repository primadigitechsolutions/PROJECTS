<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Tracker | Academic Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f8f4fa;
      color: #2c1e3f;
      min-height: 100vh;
      padding: 20px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .phone-frame {
      max-width: 380px;
      width: 100%;
      background: white;
      border-radius: 48px;
      box-shadow: 0 25px 45px -12px rgba(78, 53, 111, 0.25);
      overflow: hidden;
      height: 100vh;
      min-height: 100dvh;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      height: 44px;
      background: white;
      flex-shrink: 0;
    }
    .header {
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      flex-shrink: 0;
    }
    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: #2c1e3f;
    }
    .back-btn {
      font-size: 28px;
      cursor: pointer;
      color: #4E356F;
    }
    .greeting {
      font-size: 20px;
      font-weight: 600;
      color: #4E356F;
      margin: 12px 24px 8px;
    }
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 110px;
      -webkit-overflow-scrolling: touch;
    }
    .container {
      padding: 0 24px;
    }
    .subject-select {
      margin: 20px 0;
    }
    select, input, button {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border: 1.5px solid #ecdde6;
      border-radius: 16px;
      font-size: 16px;
    }
    .category-btns {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .category-btn {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #ecdde6;
      background: white;
      border-radius: 16px;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .category-btn.active {
      background: #4E356F;
      color: white;
      border-color: #4E356F;
    }
    .score-input {
      display: flex;
      gap: 10px;
    }
    .score-input input {
      flex: 1;
    }
    button#addScore {
      background: #4E356F;
      color: white;
      border: none;
      font-weight: 700;
      margin-top: 8px;
      padding: 14px;
      border-radius: 16px;
      width: 100%;
    }
    .entries {
      margin-top: 24px;
    }
    .entry {
      background: #f8f4fa;
      padding: 14px;
      border-radius: 16px;
      margin-bottom: 10px;
      font-size: 15px;
      display: flex;
      justify-content: space-between;
    }
    .summary {
      margin-top: 32px;
      background: white;
      border: 2px solid #4E356F;
      border-radius: 20px;
      padding: 20px;
    }
    .summary h3 {
      color: #4E356F;
      margin-bottom: 16px;
    }
    .final-grade {
      font-size: 32px;
      font-weight: 800;
      color: #4E356F;
      text-align: center;
      margin: 12px 0;
    }
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #e9dee4;
      box-shadow: 0 -10px 30px -10px rgba(78, 53, 111, 0.3);
      display: flex;
      justify-content: space-around;
      padding: 12px 0 22px;
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #9C6A82;
      font-size: 11px;
      font-weight: 600;
      gap: 4px;
      cursor: pointer;
    }
    .nav-item.active {
      color: #4E356F;
    }
    .nav-icon {
      font-size: 24px;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
   
    <div class="status-bar"></div>

    <div class="header">
      <div class="back-btn" onclick="window.location.href='dashboard.html'">←</div>
      <div class="page-title">Grade Tracker</div>
      <div style="width:28px;"></div>
    </div>

    <!-- Dynamic Greeting -->
    <div class="greeting">Hi, <span id="userName">Student</span> 👋</div>

    <!-- Scrollable Main Content -->
    <div class="main-content">
      <div class="container">
        <div class="subject-select">
          <select id="subjectSelect">
            <option value="">Select Subject</option>
            <option value="Mathematics">Mathematics - Advanced Algebra</option>
            <option value="Biology">Biology - Human Anatomy</option>
            <option value="English">English - Literature & Composition</option>
            <option value="History">History - World Civilization</option>
          </select>
        </div>

        <div class="category-btns">
          <div class="category-btn active" data-category="WW">Written Works</div>
          <div class="category-btn" data-category="PT">Performance Tasks</div>
          <div class="category-btn" data-category="QA">Quarterly Assessment</div>
        </div>

        <div class="score-input">
          <input type="number" id="score" placeholder="Score (e.g. 10)" step="0.01">
          <input type="number" id="total" placeholder="Out of (e.g. 15)" step="0.01">
        </div>

        <button id="addScore">+ Add Score</button>

        <div class="entries" id="entriesList"></div>

        <div class="summary">
          <h3>Current Summary</h3>
          <div id="summaryContent">
            <p style="color:#6b5a7a; text-align:center;">Add scores to see calculation</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <div class="nav-item" onclick="window.location.href='dashboard.html'">
        <div class="nav-icon">🏠</div>
        <div>Home</div>
      </div>
      <div class="nav-item active">
        <div class="nav-icon">📊</div>
        <div>Tracker</div>
      </div>
      <div class="nav-item" onclick="window.location.href='reviewer.html'">
        <div class="nav-icon">📄</div>
        <div>Reviewer</div>
      </div>
      <div class="nav-item" onclick="window.location.href='profile.html'">
        <div class="nav-icon">👤</div>
        <div>Profile</div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { 
      getAuth, 
      onAuthStateChanged, 
      signOut 
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC-E_V2GdszTfWmDZ3bfvRWl_zvXy4OzR8",
      authDomain: "shstrackerapp.firebaseapp.com",
      databaseURL: "https://shstrackerapp-default-rtdb.firebaseio.com",
      projectId: "shstrackerapp",
      storageBucket: "shstrackerapp.firebasestorage.app",
      messagingSenderId: "807451936679",
      appId: "1:807451936679:web:37fa86f3b272afe9505882",
      measurementId: "G-Y8WM86KTCG"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    let currentUserId = null;
    let scores = { WW: [], PT: [], QA: [] };

    const subjectSelect = document.getElementById('subjectSelect');
    const categoryBtns = document.querySelectorAll('.category-btn');
    let currentCategory = 'WW';

    // ====================== Account Sync ======================
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUserId = user.uid;
        const displayName = user.displayName || user.email?.split('@')[0] || "Student";
        document.getElementById('userName').textContent = displayName;

        console.log("✅ Tracker loaded for user:", user.email);

        // Load saved scores from Firebase
        loadScoresFromFirebase();

      } else {
        window.location.href = "login.html";
      }
    });

    // ====================== Firebase Save / Load Scores ======================
    function saveScoresToFirebase() {
      if (!currentUserId) return;
      const scoresRef = ref(database, 'users/' + currentUserId + '/trackerScores');
      set(scoresRef, scores);
    }

    function loadScoresFromFirebase() {
      if (!currentUserId) return;
      const scoresRef = ref(database, 'users/' + currentUserId + '/trackerScores');

      onValue(scoresRef, (snapshot) => {
        const savedScores = snapshot.val();
        if (savedScores) {
          scores = savedScores;
        }
        renderEntries();
        calculateGrades();
      });
    }

    // ====================== Tracker Logic ======================
    categoryBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        categoryBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.category;
      });
    });

    document.getElementById('addScore').addEventListener('click', () => {
      const score = parseFloat(document.getElementById('score').value);
      const total = parseFloat(document.getElementById('total').value);

      if (!subjectSelect.value) {
        alert("Please select a subject first.");
        return;
      }
      if (isNaN(score) || isNaN(total) || total <= 0) {
        alert("Please enter valid score and total.");
        return;
      }

      scores[currentCategory].push({ score, total, subject: subjectSelect.value });

      document.getElementById('score').value = '';
      document.getElementById('total').value = '';

      renderEntries();
      calculateGrades();
      saveScoresToFirebase();        // Auto-save to Firebase
    });

    function renderEntries() {
      const list = document.getElementById('entriesList');
      list.innerHTML = '';

      Object.keys(scores).forEach(cat => {
        if (scores[cat].length > 0) {
          const div = document.createElement('div');
          div.innerHTML = `<strong>${getCategoryName(cat)}:</strong>`;
          list.appendChild(div);

          scores[cat].forEach((item, index) => {
            const entry = document.createElement('div');
            entry.className = 'entry';
            entry.innerHTML = `
              ${item.subject ? item.subject + ' - ' : ''}${item.score} / ${item.total}
              <span style="color:#6b5a7a;">(${((item.score/item.total)*100).toFixed(1)}%)</span>
              <span onclick="deleteScore('${cat}', ${index})" style="color:#e07a5f; margin-left:10px; cursor:pointer;">×</span>
            `;
            list.appendChild(entry);
          });
        }
      });
    }

    function deleteScore(category, index) {
      if (confirm("Delete this score?")) {
        scores[category].splice(index, 1);
        renderEntries();
        calculateGrades();
        saveScoresToFirebase();
      }
    }

    function getCategoryName(cat) {
      if (cat === 'WW') return 'Written Works';
      if (cat === 'PT') return 'Performance Tasks';
      return 'Quarterly Assessment';
    }

    function calculateAverage(category) {
      if (scores[category].length === 0) return 0;
      let totalPercent = 0;
      scores[category].forEach(item => {
        totalPercent += (item.score / item.total) * 100;
      });
      return totalPercent / scores[category].length;
    }

    function getWeights() {
      return { WW: 0.25, PT: 0.50, QA: 0.25 };
    }

    function calculateGrades() {
      const avgWW = calculateAverage('WW');
      const avgPT = calculateAverage('PT');
      const avgQA = calculateAverage('QA');
      const weights = getWeights();
      const finalGrade = (avgWW * weights.WW) + (avgPT * weights.PT) + (avgQA * weights.QA);

      const summaryHTML = `
        <div style="margin-bottom:12px;">
          <strong>Written Works:</strong> ${avgWW.toFixed(1)}% <span style="color:#6b5a7a;">(25%)</span>
        </div>
        <div style="margin-bottom:12px;">
          <strong>Performance Tasks:</strong> ${avgPT.toFixed(1)}% <span style="color:#6b5a7a;">(50%)</span>
        </div>
        <div style="margin-bottom:12px;">
          <strong>Quarterly Assessment:</strong> ${avgQA.toFixed(1)}% <span style="color:#6b5a7a;">(25%)</span>
        </div>
        <hr style="margin:16px 0; border-color:#ecdde6;">
        <div class="final-grade">${finalGrade.toFixed(1)}%</div>
        <div style="text-align:center; color:#6b5a7a; font-size:14px;">Final Grade (Core Subject)</div>
      `;
      document.getElementById('summaryContent').innerHTML = summaryHTML;
    }

    // Logout function
    function logout() {
      if (confirm("Are you sure you want to logout?")) {
        signOut(auth).then(() => {
          window.location.href = "login.html";
        }).catch((error) => {
          alert("Failed to logout.");
        });
      }
    }
  </script>
</body>
</html>
