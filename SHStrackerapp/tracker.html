<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Grade Tracker | Academic Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f8f4fa;
      color: #2c1e3f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .phone-frame {
      max-width: 400px; width: 100%; background: white; 
      border-radius: 40px; box-shadow: 0 25px 45px -12px rgba(78, 53, 111, 0.2);
      overflow: hidden; height: 92vh; position: relative; 
      display: flex; flex-direction: column;
    }

    .header {
      padding: 20px 24px 10px; display: flex;
      justify-content: space-between; align-items: center; flex-shrink: 0;
    }
    .page-title { font-size: 22px; font-weight: 700; color: #2c1e3f; }
    .back-btn { font-size: 24px; cursor: pointer; color: #4E356F; text-decoration: none; padding: 5px; }
    .greeting { font-size: 18px; font-weight: 600; color: #4E356F; margin: 0 24px 15px; }

    .main-content { flex: 1; overflow-y: auto; padding: 0 20px 100px; }
    .container { display: flex; flex-direction: column; gap: 12px; }

    select, input, button {
      padding: 14px; border: 1.5px solid #ecdde6; border-radius: 16px; 
      font-size: 15px; outline: none; transition: all 0.2s;
    }
    select:focus, input:focus { border-color: #4E356F; background: #fff; }

    .subject-row { display: flex; gap: 10px; align-items: center; }
    .subject-row select { flex: 1; }

    .add-subject-btn {
      background: #4E356F; color: white; border: none; width: 50px; 
      height: 50px; font-size: 24px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }

    .type-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .type-btn {
      padding: 12px; border: 1.5px solid #ecdde6; background: white; 
      border-radius: 14px; text-align: center; font-weight: 600; 
      cursor: pointer; font-size: 14px;
    }
    .type-btn.active { background: #4E356F; color: white; border-color: #4E356F; }

    #testDate { width: 100%; margin-bottom: 4px; }
    .score-input { display: flex; gap: 10px; width: 100%; }
    .score-input input { flex: 1; min-width: 0; }

    #addScore { background: #4E356F; color: white; border: none; font-weight: 700; cursor: pointer; margin-top: 5px; }
    
    .entries { margin-top: 10px; }
    .entry {
      background: #fcfaff; padding: 14px; border-radius: 14px;
      margin-bottom: 8px; display: flex; justify-content: space-between; 
      align-items: center; border: 1px solid #f0e6f0;
    }
    .entry-info { display: flex; flex-direction: column; }
    .entry-date { font-size: 11px; color: #9C6A82; margin-top: 2px; }
    .delete-btn { color: #e07a5f; cursor: pointer; font-size: 22px; padding: 0 5px; }

    .summary {
      background: white; border: 2px solid #4E356F; border-radius: 20px; 
      padding: 18px; margin-top: 15px; margin-bottom: 20px;
    }
    .final-grade { font-size: 32px; font-weight: 800; color: #4E356F; text-align: center; margin: 10px 0; }

    .modal {
      display: none; position: fixed; top: 0; left: 0; 
      width: 100%; height: 100%; background: rgba(0,0,0,0.6); 
      align-items: center; justify-content: center; z-index: 2000;
      padding: 20px; backdrop-filter: blur(2px);
    }
    .modal-content {
      background: white; width: 100%; max-width: 320px; 
      border-radius: 24px; padding: 25px; text-align: center;
    }
    .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .modal-btn { flex: 1; border: none; cursor: pointer; padding: 14px; border-radius: 14px; font-weight: 700; }
    .modal-btn.cancel { background: #f0e6f0; color: #4E356F; }
    .modal-btn.confirm { background: #4E356F; color: white; }
    .modal-btn.danger { background: #e07a5f; color: white; }

    .bottom-nav {
      position: absolute; bottom: 0; left: 0; right: 0; 
      background: white; border-top: 1px solid #e9dee4; 
      display: flex; justify-content: space-around; padding: 10px 0 25px;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: #9C6A82; font-size: 11px; cursor: pointer; }
    .nav-item.active { color: #4E356F; font-weight: 700; }
    .nav-icon { font-size: 22px; margin-bottom: 4px; }
  </style>
</head>
<body>

<div class="phone-frame">
  <div class="header">
    <div class="back-btn" onclick="window.location.href='dashboard.html'">←</div>
    <div class="page-title">Grade Tracker</div>
    <div style="width:24px;"></div>
  </div>

  <div class="greeting">Hi, <span id="userName">Student</span> 👋</div>

  <div class="main-content">
    <div class="container">
      <div class="subject-row">
        <select id="subjectSelect"><option value="">Select Subject</option></select>
        <button class="add-subject-btn" onclick="openModal('addSubjectModal')">+</button>
      </div>

      <select id="quarterSelect">
        <option value="Q1">1st Quarter</option>
        <option value="Q2">2nd Quarter</option>
        <option value="Q3">3rd Quarter</option>
        <option value="Q4">4th Quarter</option>
      </select>

      <div class="type-btns">
        <div class="type-btn active" data-type="Quiz">Quiz</div>
        <div class="type-btn" data-type="Activity">Activity</div>
        <div class="type-btn" data-type="PETA">PETA</div>
        <div class="type-btn" data-type="Exam">Exam</div>
      </div>

      <input type="date" id="testDate">
      <div class="score-input">
        <input type="number" id="score" placeholder="Score" step="0.01">
        <input type="number" id="total" placeholder="Total" step="0.01">
      </div>

      <button id="addScore">+ Add Score</button>

      <div class="entries" id="entriesList"></div>

      <div class="summary">
        <h3 id="summaryTitle" style="font-size: 16px; text-align: center;">Summary</h3>
        <div id="summaryContent">
          <p style="color:#6b5a7a; text-align:center; font-size: 14px; margin-top: 10px;">Select a subject to see grades</p>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='dashboard.html'"><div class="nav-icon">🏠</div>Home</div>
    <div class="nav-item active"><div class="nav-icon">📊</div>Tracker</div>
    <div class="nav-item" onclick="window.location.href='reviewer.html'"><div class="nav-icon">📄</div>Reviewer</div>
    <div class="nav-item" onclick="window.location.href='profile.html'"><div class="nav-icon">👤</div>Profile</div>
  </div>
</div>

<div id="addSubjectModal" class="modal">
  <div class="modal-content">
    <h3>New Subject</h3>
    <input type="text" id="newSubjectName" placeholder="e.g. English" style="width: 100%; margin: 15px 0 10px;">
    <select id="newSubjectType" style="width: 100%; margin-bottom: 10px;">
      <option value="core">Core Subject</option>
      <option value="applied">Applied Subject</option>
    </select>
    <div class="modal-buttons">
      <button class="modal-btn cancel" onclick="closeModal('addSubjectModal')">Cancel</button>
      <button class="modal-btn confirm" id="btnSaveSubject">Save</button>
    </div>
  </div>
</div>

<div id="confirmModal" class="modal">
  <div class="modal-content">
    <h3>Delete Record?</h3>
    <p id="confirmText" style="margin-top: 10px; font-size: 14px; color: #666;"></p>
    <div class="modal-buttons">
      <button class="modal-btn cancel" onclick="closeModal('confirmModal')">Cancel</button>
      <button class="modal-btn danger" id="btnConfirmAction">Delete</button>
    </div>
  </div>
</div>

<div id="alertModal" class="modal">
  <div class="modal-content">
    <h3 id="alertTitle">Notice</h3>
    <p id="alertText" style="margin: 15px 0; font-size: 14px; color: #666;"></p>
    <button class="modal-btn confirm" style="width: 100%;" onclick="closeModal('alertModal')">OK</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC-E_V2GdszTfWmDZ3bfvRWl_zvXy4OzR8",
    authDomain: "shstrackerapp.firebaseapp.com",
    databaseURL: "https://shstrackerapp-default-rtdb.firebaseio.com",
    projectId: "shstrackerapp",
    storageBucket: "shstrackerapp.firebasestorage.app",
    messagingSenderId: "807451936679",
    appId: "1:807451936679:web:37fa86f3b272afe9505882"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const database = getDatabase(app);

  let currentUserId = null, subjects = {}, scores = {};
  let currentQuarter = localStorage.getItem('lastQuarter') || 'Q1';
  let currentType = localStorage.getItem('lastType') || 'Quiz';
  const today = new Date().toISOString().split('T')[0];
  
  document.getElementById('testDate').value = today;
  document.getElementById('quarterSelect').value = currentQuarter;

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUserId = user.uid;
      document.getElementById('userName').textContent = user.displayName || user.email?.split('@')[0];
      loadUserData();
    } else { window.location.href = "login.html"; }
  });

  function loadUserData() {
    onValue(ref(database, `users/${currentUserId}/subjects`), (s) => { 
      subjects = s.val() || {}; 
      populateDropdown(); 
      // Apply saved subject after dropdown is loaded
      const lastSub = localStorage.getItem('lastSubject');
      if (lastSub && subjects[lastSub]) {
        document.getElementById('subjectSelect').value = lastSub;
      }
      renderEntries(); 
      calculateGrades();
    });

    onValue(ref(database, `users/${currentUserId}/trackerScores`), (s) => { 
      scores = s.val() || {}; 
      renderEntries(); 
      calculateGrades(); 
    });

    // Apply active state to saved type button
    document.querySelectorAll('.type-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.type === currentType);
    });
  }

  function populateDropdown() {
    const sel = document.getElementById('subjectSelect');
    const cur = sel.value;
    sel.innerHTML = '<option value="">Select Subject</option>';
    Object.keys(subjects).sort().forEach(n => {
      const o = document.createElement('option'); o.value = n; o.textContent = n; sel.appendChild(o);
    });
    if(cur) sel.value = cur;
  }

  function savePreferences() {
    localStorage.setItem('lastSubject', document.getElementById('subjectSelect').value);
    localStorage.setItem('lastQuarter', currentQuarter);
    localStorage.setItem('lastType', currentType);
  }

  window.openModal = (id) => document.getElementById(id).style.display = 'flex';
  window.closeModal = (id) => document.getElementById(id).style.display = 'none';
  
  function showCustomAlert(title, message) {
    document.getElementById('alertTitle').textContent = title;
    document.getElementById('alertText').textContent = message;
    openModal('alertModal');
  }

  document.getElementById('btnSaveSubject').onclick = () => {
    const name = document.getElementById('newSubjectName').value.trim();
    const type = document.getElementById('newSubjectType').value;
    if (!name) return showCustomAlert("Required", "Please enter a subject name.");
    set(ref(database, `users/${currentUserId}/subjects/${name}`), type);
    document.getElementById('newSubjectName').value = '';
    closeModal('addSubjectModal');
  };

  document.getElementById('addScore').onclick = () => {
    const s = parseFloat(document.getElementById('score').value);
    const t = parseFloat(document.getElementById('total').value);
    const d = document.getElementById('testDate').value;
    const sub = document.getElementById('subjectSelect').value;
    
    if (!sub) return showCustomAlert("Error", "Select a subject first.");
    if (isNaN(s) || isNaN(t)) return showCustomAlert("Error", "Enter valid scores.");
    
    push(ref(database, `users/${currentUserId}/trackerScores/${currentQuarter}/${sub}/${currentType}`), { 
      score: s, total: t, date: d 
    });
    document.getElementById('score').value = ''; 
    document.getElementById('total').value = '';
  };

  window.deleteScore = (q, sub, type, key) => {
    document.getElementById('confirmText').textContent = "This entry will be permanently deleted.";
    openModal('confirmModal');
    document.getElementById('btnConfirmAction').onclick = () => {
      remove(ref(database, `users/${currentUserId}/trackerScores/${q}/${sub}/${type}/${key}`));
      closeModal('confirmModal');
    };
  };

  document.querySelectorAll('.type-btn').forEach(b => b.onclick = () => {
    document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
    b.classList.add('active'); 
    currentType = b.dataset.type;
    savePreferences();
    renderEntries();
  });

  document.getElementById('subjectSelect').onchange = () => { 
    savePreferences(); 
    renderEntries(); 
    calculateGrades(); 
  };
  
  document.getElementById('quarterSelect').onchange = (e) => { 
    currentQuarter = e.target.value; 
    savePreferences();
    renderEntries(); 
    calculateGrades(); 
  };

  function renderEntries() {
    const list = document.getElementById('entriesList'); list.innerHTML = '';
    const sub = document.getElementById('subjectSelect').value;
    const data = scores[currentQuarter]?.[sub];
    if (!data) return;

    ['Quiz', 'Activity', 'PETA', 'Exam'].forEach(type => {
      if (data[type]) {
        const h = document.createElement('div'); h.style = "font-size: 12px; font-weight: bold; margin-top: 15px; color: #4E356F;";
        h.textContent = type.toUpperCase(); list.appendChild(h);
        Object.keys(data[type]).forEach(k => {
          const i = data[type][k];
          const div = document.createElement('div'); div.className = 'entry';
          div.innerHTML = `<div class="entry-info"><span>${i.score} / ${i.total}</span><span class="entry-date">${i.date}</span></div>
                           <span class="delete-btn" onclick="deleteScore('${currentQuarter}','${sub}','${type}','${k}')">×</span>`;
          list.appendChild(div);
        });
      }
    });
  }

  function calculateGrades() {
    const sub = document.getElementById('subjectSelect').value;
    const data = scores[currentQuarter]?.[sub];
    if (!sub || !data) {
      document.getElementById('summaryContent').innerHTML = '<p style="text-align:center; font-size:14px; color:#888;">No data found.</p>';
      return;
    }
    const getAvg = (o) => {
      if(!o) return 0; const v = Object.values(o);
      return (v.reduce((a,b) => a + (b.score/b.total), 0) / v.length) * 100;
    };
    const isCore = subjects[sub] === 'core';
    const ww = (getAvg(data.Quiz) + getAvg(data.Activity)) / 2;
    const pt = getAvg(data.PETA), ex = getAvg(data.Exam);
    const ptW = isCore ? 0.50 : 0.45, exW = isCore ? 0.25 : 0.30;
    const final = (ww * 0.25) + (pt * ptW) + (ex * exW);

    document.getElementById('summaryTitle').textContent = `${sub} - ${currentQuarter}`;
    document.getElementById('summaryContent').innerHTML = `
      <div style="display:flex; justify-content:space-between; font-size:14px; margin-bottom:5px;"><span>Written (25%)</span><strong>${ww.toFixed(1)}%</strong></div>
      <div style="display:flex; justify-content:space-between; font-size:14px; margin-bottom:5px;"><span>Performance (${ptW*100}%)</span><strong>${pt.toFixed(1)}%</strong></div>
      <div style="display:flex; justify-content:space-between; font-size:14px; margin-bottom:5px;"><span>Exam (${exW*100}%)</span><strong>${ex.toFixed(1)}%</strong></div>
      <div class="final-grade">${final.toFixed(1)}%</div>`;
  }
</script>
</body>
</html>
