<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Arduino Builder Touch Fixed</title>

<style>
:root{
--bg:#f0f4f8;
--panel:#fff;
--accent:#3182ce;
--accent-soft:#ebf8ff;
--text-main:#2d3748;
--text-light:#718096;
--border:#e2e8f0;
}

body{
font-family:Segoe UI,system-ui;
background:var(--bg);
margin:0;
padding:40px 20px;
display:flex;
justify-content:center;
color:var(--text-main);
touch-action:manipulation;
}

.container{
display:flex;
gap:24px;
width:100%;
max-width:1000px;
}

.panel{
background:#fff;
border:1px solid var(--border);
border-radius:16px;
padding:24px;
box-shadow:0 10px 25px rgba(0,0,0,.03);
flex:1;
min-height:600px;
}

h3{
font-size:.75rem;
letter-spacing:1px;
text-transform:uppercase;
color:var(--accent);
border-bottom:2px solid var(--accent-soft);
padding-bottom:8px;
margin:0 0 20px;
}

.block{
background:white;
border:1px solid var(--border);
border-radius:8px;
padding:14px;
margin-bottom:12px;
cursor:grab;
user-select:none;
font-weight:500;
transition:.2s;
}

.block:hover{
background:var(--accent-soft);
border-color:var(--accent);
}

.block:active{
transform:scale(.98);
}

.num-block{
border:2px dashed var(--accent);
background:var(--accent-soft);
text-align:center;
font-weight:700;
color:var(--accent);
}

#sequence{
min-height:500px;
}

.step{
background:white;
border:1px solid var(--border);
border-left:6px solid var(--accent);
border-radius:8px;
padding:12px 16px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
animation:fade .25s;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:none;}
}

.step.dragging{
opacity:.3;
}

.slot{
display:inline-flex;
align-items:center;
justify-content:center;
background:#f7fafc;
border:2px dashed #cbd5e0;
border-radius:6px;
height:32px;
min-width:90px;
margin-left:12px;
font-size:.7rem;
}

.slot.drag-over{
background:var(--accent-soft);
border-color:var(--accent);
}

.stepper{
display:inline-flex;
background:#f7fafc;
border:2px solid #cbd5e0;
border-radius:6px;
overflow:hidden;
margin-left:12px;
}

.stepper.active{
background:var(--accent);
border-color:var(--accent);
}

.step-btn{
background:none;
border:none;
padding:4px 12px;
font-size:18px;
cursor:pointer;
color:#4a5568;
}

.stepper.active .step-btn{
color:white;
}

.step-val{
display:flex;
align-items:center;
justify-content:center;
min-width:32px;
padding:0 10px;
font-family:monospace;
}

.stepper.active .step-val{
color:white;
}

.del-btn{
border:none;
background:none;
font-size:24px;
cursor:pointer;
color:#cbd5e0;
}

.del-btn:hover{
color:#ef4444;
}

.clear-btn{
width:100%;
margin-top:20px;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
font-weight:600;
background:#edf2f7;
}

.touchGhost{
position:fixed;
z-index:9999;
pointer-events:none;
background:white;
border:2px solid var(--accent);
padding:12px 16px;
border-radius:8px;
box-shadow:0 8px 20px rgba(0,0,0,.2);
}
</style>
</head>
<body>

<div class="container">

<div class="panel">
<h3>Block Library</h3>

<div class="block"
draggable="true"
onclick="quickAdd('Get Sensor Value')"
ondragstart="dragStart(event,'func','Get Sensor Value')"
ontouchstart="touchBlockStart(event,'func','Get Sensor Value')">
Get Sensor Value
</div>

<div class="block"
draggable="true"
onclick="quickAdd('Rest for')"
ondragstart="dragStart(event,'func','Rest for')"
ontouchstart="touchBlockStart(event,'func','Rest for')">
Rest for
</div>

<div style="height:20px"></div>

<h3>Data Types</h3>

<div class="block num-block"
draggable="true"
onclick="tapNumberFill()"
ondragstart="dragStart(event,'num',null)"
ontouchstart="touchBlockStart(event,'num',null)">
NUMBER
</div>

<button
class="clear-btn"
onclick="clearAll()">
Clear All
</button>

</div>

<div class="panel">
<h3>Active Sequence</h3>

<div id="sequence"
ondragover="onDragOverSeq(event)"
ondrop="onDropSeq(event)">
</div>

</div>

</div>

<script>
let steps=[];
let activeStepper=null;

/* quick add */
function quickAdd(label){
steps.push({
label,
value:null
});
render();
}

/* tap NUMBER fills selected block */
function tapNumberFill(){
if(
activeStepper!==null &&
steps[activeStepper].value===null
){
steps[activeStepper].value=0;
render();
}
}

/* desktop drag */

function dragStart(e,type,label,index=null){
e.dataTransfer.setData("type",type);
e.dataTransfer.setData("label",label);
if(index!==null){
e.dataTransfer.setData(
"oldIndex",
index
);
}
}

function onDragOverSeq(e){
e.preventDefault();
}

function getDragAfterElement(container,y){

const els=[
...container.querySelectorAll(
".step:not(.dragging)"
)
];

return els.reduce(
(closest,child)=>{

const box=
child.getBoundingClientRect();

const offset=
y-box.top-box.height/2;

if(
offset<0 &&
offset>closest.offset
){
return{
offset,
element:child
}
}

return closest;

},{
offset:-Infinity
}
).element;
}

function onDropSeq(e){

e.preventDefault();

let type=
e.dataTransfer.getData("type");

if(type!=="func") return;

let label=
e.dataTransfer.getData("label");

let oldIndex=
e.dataTransfer.getData(
"oldIndex"
);

const container=
document.getElementById(
"sequence"
);

const after=
getDragAfterElement(
container,
e.clientY
);

let newIndex=
after==null
?steps.length
:[...container.children]
.indexOf(after);

if(oldIndex!==""){

oldIndex=parseInt(oldIndex);

let moved=
steps.splice(
oldIndex,
1
)[0];

if(
oldIndex<newIndex
){
newIndex--;
}

steps.splice(
newIndex,
0,
moved
);

}else{

steps.splice(
newIndex,
0,
{
label,
value:null
}
);

}

render();
}

/* touch drag for BOTH blocks */

let ghost=null;
let touchType=null;
let touchLabel=null;

function touchBlockStart(
e,
type,
label
){

touchType=type;
touchLabel=label;

ghost=
document.createElement(
"div"
);

ghost.className=
"touchGhost";

ghost.innerText=
type==="num"
?"NUMBER"
:label;

document.body.appendChild(
ghost
);

moveGhost(
e.touches[0]
);

document.addEventListener(
"touchmove",
touchMove,
{passive:false}
);

document.addEventListener(
"touchend",
touchEnd
);
}

function touchMove(e){
e.preventDefault();
moveGhost(
e.touches[0]
);
}

function moveGhost(t){
ghost.style.left=
(t.clientX+10)+"px";
ghost.style.top=
(t.clientY+10)+"px";
}

function touchEnd(e){

document.removeEventListener(
"touchmove",
touchMove
);

document.removeEventListener(
"touchend",
touchEnd
);

let t=
e.changedTouches[0];

let target=
document.elementFromPoint(
t.clientX,
t.clientY
);

/* function drop */
if(
touchType==="func"
){

if(
document
.getElementById(
"sequence"
)
.contains(target)
){
steps.push({
label:touchLabel,
value:null
});
render();
}

}

/* number drop into slot */
if(
touchType==="num"
){

let slot=
target.closest(".slot");

if(slot){

let i=
parseInt(
slot.dataset.index
);

steps[i].value=0;
render();

}

}

if(ghost){
ghost.remove();
ghost=null;
}
}

/* slot drop */
function dropOnSlot(e,i){

e.preventDefault();
e.stopPropagation();

if(
e.dataTransfer.getData(
"type"
)==="num"
){
steps[i].value=0;
render();
}
}

function adjustValue(i,a){
steps[i].value=
Math.max(
0,
steps[i].value+a
);
render();
}

function activateStepper(i,e){
e.stopPropagation();
activeStepper=i;
render();
}

document.addEventListener(
"click",
()=>{
activeStepper=null;
render();
}
);

function removeStep(i){
steps.splice(i,1);
render();
}

function clearAll(){
if(confirm(
"Start a new sequence?"
)){
steps=[];
render();
}
}

function render(){

const seq=
document.getElementById(
"sequence"
);

seq.innerHTML="";

if(!steps.length){
seq.innerHTML=
`
<div style="
text-align:center;
margin-top:100px;
border:2px dashed #e2e8f0;
padding:40px;
border-radius:12px;
color:#a0aec0;">
Drag or tap functions here
</div>
`;
}

steps.forEach((step,i)=>{

let row=
document.createElement(
"div"
);

row.className="step";

row.draggable=true;

row.ondragstart=(e)=>{
row.classList.add(
"dragging"
);
dragStart(
e,
"func",
step.label,
i
);
};

row.ondragend=()=>{
row.classList.remove(
"dragging"
);
};

let valDisplay;

if(
step.value===null
){

valDisplay=
`
<div
class="slot"
data-index="${i}"
ondragover="
event.preventDefault()
"
ondrop="
dropOnSlot(event,${i})
">
drop number
</div>
`;

}else{

valDisplay=
`
<div class="stepper ${activeStepper===i?'active':''}"
onclick="
activateStepper(${i},event)
">

<button
class="step-btn"
onclick="
adjustValue(${i},-1)
">
-
</button>

<div class="step-val">
${step.value}
</div>

<button
class="step-btn"
onclick="
adjustValue(${i},1)
">
+
</button>

</div>
`;

}

row.innerHTML=
`
<div style="
display:flex;
align-items:center;">
<span>
${step.label}
</span>
${valDisplay}
</div>

<button
class="del-btn"
onclick="
removeStep(${i})
">
&times;
</button>
`;

seq.appendChild(row);

});

}

render();
</script>

</body>
</html>
