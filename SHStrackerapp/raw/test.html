<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">
<title>Arduino Builder</title>

<style>
:root{
--bg:#f0f4f8;
--panel:#fff;
--accent:#3182ce;
--accent-soft:#ebf8ff;
--border:#e2e8f0;
}

body{
font-family:Segoe UI,system-ui;
background:var(--bg);
margin:0;
padding:40px 20px;
display:flex;
justify-content:center;
touch-action:manipulation;
}

.container{
display:flex;
gap:24px;
width:100%;
max-width:1000px;
}

.panel{
background:white;
border:1px solid var(--border);
border-radius:16px;
padding:24px;
box-shadow:0 10px 25px rgba(0,0,0,.03);
flex:1;
min-height:600px;
}

h3{
font-size:.75rem;
text-transform:uppercase;
letter-spacing:1px;
color:var(--accent);
margin:0 0 20px;
border-bottom:2px solid var(--accent-soft);
padding-bottom:8px;
}

.block{
background:white;
border:1px solid var(--border);
border-radius:8px;
padding:14px;
margin-bottom:12px;
cursor:grab;
font-weight:500;
user-select:none;
transition:.2s;
}

.block:hover{
background:var(--accent-soft);
border-color:var(--accent);
}

.num-block{
border:2px dashed var(--accent);
background:var(--accent-soft);
color:var(--accent);
text-align:center;
font-weight:700;
}

#sequence{
min-height:500px;
}

.step{
background:white;
border:1px solid var(--border);
border-left:6px solid var(--accent);
border-radius:8px;
padding:12px 16px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.slot{
display:inline-flex;
align-items:center;
justify-content:center;
background:#f7fafc;
border:2px dashed #cbd5e0;
border-radius:6px;
min-width:95px;
height:34px;
margin-left:12px;
font-size:.7rem;
cursor:pointer;
transition:.2s;
}

.slot.active{
background:var(--accent);
border-color:var(--accent);
color:white;
font-weight:700;
}

/* value pill */
.value-pill{
display:inline-flex;
align-items:center;
justify-content:center;
margin-left:12px;
padding:7px 16px;
background:#f7fafc;
border:2px solid #cbd5e0;
border-radius:8px;
cursor:pointer;
font-weight:700;
min-width:55px;
transition:.2s;
}

.value-pill.active{
background:var(--accent);
border-color:var(--accent);
color:white;
}

.del-btn{
background:none;
border:none;
font-size:24px;
cursor:pointer;
color:#cbd5e0;
}

.clear-btn{
width:100%;
margin-top:20px;
padding:12px;
border:none;
border-radius:8px;
background:#edf2f7;
font-weight:600;
cursor:pointer;
}

.touchGhost{
position:fixed;
z-index:9999;
pointer-events:none;
background:white;
border:2px solid var(--accent);
padding:12px 16px;
border-radius:8px;
box-shadow:0 8px 20px rgba(0,0,0,.2);
}

/* bottom editor */
#editorOverlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.15);
z-index:2000;
}

#editorSheet{
position:absolute;
left:0;
right:0;
bottom:0;
background:white;
padding:28px;
border-radius:22px 22px 0 0;
box-shadow:0 -8px 30px rgba(0,0,0,.15);
text-align:center;
}

.editorLabel{
font-size:13px;
opacity:.6;
margin-bottom:12px;
}

.editorValue{
font-size:44px;
font-weight:700;
margin-bottom:20px;
}

.editorBtns{
display:flex;
justify-content:center;
gap:18px;
}

.editBtn{
width:72px;
height:72px;
border:none;
border-radius:18px;
background:var(--accent);
color:white;
font-size:36px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<div class="panel">

<h3>Block Library</h3>

<div class="block"
draggable="true"
onclick="quickAdd('Get Sensor Value')"
ondragstart="dragStart(event,'func','Get Sensor Value')"
ontouchstart="touchBlockStart(event,'func','Get Sensor Value')">
Get Sensor Value
</div>

<div class="block"
draggable="true"
onclick="quickAdd('Rest for')"
ondragstart="dragStart(event,'func','Rest for')"
ontouchstart="touchBlockStart(event,'func','Rest for')">
Rest for
</div>

<div style="height:20px"></div>

<h3>Data Types</h3>

<div class="block num-block"
draggable="true"
onclick="tapNumberFill()"
ondragstart="dragStart(event,'num',null)"
ontouchstart="touchBlockStart(event,'num',null)">
NUMBER
</div>

<button class="clear-btn"
onclick="clearAll()">
Clear All
</button>

</div>


<div class="panel">
<h3>Active Sequence</h3>
<div id="sequence"
ondragover="onDragOverSeq(event)"
ondrop="onDropSeq(event)">
</div>
</div>

</div>


<!-- Bottom Number Editor -->
<div id="editorOverlay"
onclick="closeEditor()">

<div id="editorSheet"
onclick="event.stopPropagation()">

<div class="editorLabel">
Adjust Value
</div>

<div id="editorValue"
class="editorValue">
0
</div>

<div class="editorBtns">
<button class="editBtn"
onclick="adjustEditor(-1)">
−
</button>

<button class="editBtn"
onclick="adjustEditor(1)">
+
</button>
</div>

</div>
</div>


<script>
let steps=[];
let selectedSlot=null;
let editingIndex=null;

/* add function */
function quickAdd(label){
steps.push({
label,
value:null
});
render();
}

/* select empty slot */
function selectSlot(i,e){
e.stopPropagation();
selectedSlot=i;
render();
}

/* tap number fills selected slot */
function tapNumberFill(){

if(
selectedSlot!==null &&
steps[selectedSlot].value===null
){
steps[selectedSlot].value=0;
selectedSlot=null;
render();
}

}

/* open bottom editor */
function openEditor(i,e){
e.stopPropagation();

editingIndex=i;

document.getElementById(
"editorValue"
).innerText=
steps[i].value;

document.getElementById(
"editorOverlay"
).style.display="block";

render();
}

function adjustEditor(amount){

steps[editingIndex].value=
Math.max(
0,
steps[editingIndex].value+
amount
);

document.getElementById(
"editorValue"
).innerText=
steps[editingIndex].value;

render();
}

function closeEditor(){
editingIndex=null;

document.getElementById(
"editorOverlay"
).style.display="none";

render();
}

/* drag desktop */
function dragStart(e,type,label,index=null){
e.dataTransfer.setData("type",type);
e.dataTransfer.setData("label",label);
if(index!==null){
e.dataTransfer.setData(
"oldIndex",
index
);
}
}

function onDragOverSeq(e){
e.preventDefault();
}

function getDragAfterElement(container,y){

const els=[
...container.querySelectorAll(
".step:not(.dragging)"
)
];

return els.reduce(
(c,child)=>{

const box=
child.getBoundingClientRect();

const offset=
y-box.top-box.height/2;

if(
offset<0 &&
offset>c.offset
){
return{
offset,
element:child
}
}

return c;

},{
offset:-Infinity
}
).element;
}

function onDropSeq(e){

e.preventDefault();

let type=
e.dataTransfer.getData("type");

if(type!=="func") return;

let label=
e.dataTransfer.getData("label");

let oldIndex=
e.dataTransfer.getData(
"oldIndex"
);

const container=
document.getElementById(
"sequence"
);

const after=
getDragAfterElement(
container,
e.clientY
);

let newIndex=
after==null
?steps.length
:[...container.children]
.indexOf(after);

if(oldIndex!==""){

oldIndex=parseInt(oldIndex);

let moved=
steps.splice(oldIndex,1)[0];

if(oldIndex<newIndex){
newIndex--;
}

steps.splice(
newIndex,
0,
moved
);

}else{

steps.splice(
newIndex,
0,
{
label,
value:null
}
);

}

render();
}

/* touch drag */
let ghost=null;
let touchType=null;
let touchLabel=null;

function touchBlockStart(
e,
type,
label
){

touchType=type;
touchLabel=label;

ghost=
document.createElement("div");

ghost.className=
"touchGhost";

ghost.innerText=
type==="num"
?"NUMBER"
:label;

document.body.appendChild(
ghost
);

moveGhost(
e.touches[0]
);

document.addEventListener(
"touchmove",
touchMove,
{passive:false}
);

document.addEventListener(
"touchend",
touchEnd
);
}

function touchMove(e){
e.preventDefault();
moveGhost(
e.touches[0]
);
}

function moveGhost(t){
ghost.style.left=
(t.clientX+10)+"px";

ghost.style.top=
(t.clientY+10)+"px";
}

function touchEnd(e){

document.removeEventListener(
"touchmove",
touchMove
);

document.removeEventListener(
"touchend",
touchEnd
);

let t=
e.changedTouches[0];

let target=
document.elementFromPoint(
t.clientX,
t.clientY
);

if(
touchType==="func"
){

if(
document
.getElementById(
"sequence"
)
.contains(target)
){
steps.push({
label:touchLabel,
value:null
});
render();
}

}

if(
touchType==="num"
){

let slot=
target.closest(".slot");

if(slot){

let i=
parseInt(
slot.dataset.index
);

steps[i].value=0;
render();
}

}

if(ghost){
ghost.remove();
ghost=null;
}

}

/* number drag drop */
function dropOnSlot(e,i){

e.preventDefault();
e.stopPropagation();

if(
e.dataTransfer.getData(
"type"
)==="num"
){
steps[i].value=0;
selectedSlot=null;
render();
}

}

function removeStep(i){
steps.splice(i,1);
render();
}

function clearAll(){
if(confirm(
"Start a new sequence?"
)){
steps=[];
render();
}
}

/* deselect */
document.addEventListener(
"click",
()=>{
selectedSlot=null;
render();
}
);

function render(){

const seq=
document.getElementById(
"sequence"
);

seq.innerHTML="";

if(!steps.length){

seq.innerHTML=
`
<div style="
text-align:center;
margin-top:100px;
padding:40px;
border:2px dashed #e2e8f0;
border-radius:12px;
color:#a0aec0;">
Drag or tap functions here
</div>
`;

}

steps.forEach((step,i)=>{

let row=
document.createElement(
"div"
);

row.className="step";

let valueDisplay="";

if(
step.value===null
){

valueDisplay=
`
<div
class="slot ${selectedSlot===i?'active':''}"
data-index="${i}"
onclick="
selectSlot(${i},event)
"
ondragover="
event.preventDefault()
"
ondrop="
dropOnSlot(event,${i})
">
drop number
</div>
`;

}else{

valueDisplay=
`
<div
class="value-pill
${editingIndex===i?'active':''}"
onclick="
openEditor(${i},event)
">
${step.value}
</div>
`;

}

row.innerHTML=
`
<div style="
display:flex;
align-items:center;">
<span>
${step.label}
</span>

${valueDisplay}
</div>

<button
class="del-btn"
onclick="
removeStep(${i})
">
&times;
</button>
`;

seq.appendChild(
row
);

});

}

render();
</script>

</body>
</html>
