<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Counter</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; }
    #status { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Supabase Counter Demo</h1>
  <button id="incrementBtn">Increment Count</button>
  <div id="status"></div>

  <script>
    // === REPLACE THESE WITH YOUR OWN VALUES ===
    const SUPABASE_URL = 'https://your-project-ref.supabase.co';
    const SUPABASE_ANON_KEY = 'your-anon-public-key-here';

    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusEl = document.getElementById('status');
    const btn = document.getElementById('incrementBtn');

    async function incrementCount() {
      btn.disabled = true;
      statusEl.textContent = 'Adding to database...';

      const { data, error } = await supabase
        .from('counts')
        .insert([
          { count: 1 }   // You can change this to any number you want to add
        ])
        .select();

      if (error) {
        console.error(error);
        statusEl.textContent = 'Error: ' + error.message;
      } else {
        statusEl.textContent = `✅ Successfully added! New row ID: ${data[0].id}`;
      }

      btn.disabled = false;
    }

    btn.addEventListener('click', incrementCount);
  </script>
</body>
</html>
