<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Counter</title>
  
  <!-- Load Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 60px;
      background: #f8f9fa;
    }
    h1 { color: #333; }
    button {
      padding: 15px 40px;
      font-size: 20px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 20px;
    }
    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    #status {
      margin-top: 25px;
      font-size: 18px;
      min-height: 30px;
    }
    .success { color: #22c55e; }
    .error   { color: #ef4444; }
  </style>
</head>
<body>
  <h1>Supabase Counter</h1>
  <p>Click the button to add +1 to your database</p>
  
  <button id="incrementBtn">Add Count (+1)</button>
  <div id="status"></div>

  <script>
    // Wait until Supabase library is fully loaded
    window.addEventListener('load', () => {
      
      const SUPABASE_URL = 'https://cdbhoufvpayiyccitaqp.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkYmhvdWZ2cGF5aXljY2l0YXFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTc0MDQsImV4cCI6MjA5MzEzMzQwNH0.Bwn6robqVEcZGqovHYnH_zRQ9h80jPausbzf1ZfMWIg';

      // Correct way to create client from CDN
      const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const btn = document.getElementById('incrementBtn');
      const statusEl = document.getElementById('status');

      async function addCount() {
        btn.disabled = true;
        statusEl.textContent = 'Inserting into database...';
        statusEl.className = '';

        const { data, error } = await supabaseClient
          .from('counts')
          .insert({ count: 1 })
          .select();

        if (error) {
          console.error(error);
          statusEl.textContent = '❌ Error: ' + error.message;
          statusEl.className = 'error';
        } else {
          statusEl.textContent = `✅ Successfully added! Row ID: ${data[0].id}`;
          statusEl.className = 'success';
        }

        btn.disabled = false;
      }

      btn.addEventListener('click', addCount);
      
      // Optional: Show ready message
      statusEl.textContent = '✅ Ready - Click the button to add count';
      statusEl.className = 'success';
    });
  </script>
</body>
</html>
