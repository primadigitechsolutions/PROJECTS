<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">
<title>Arduino Builder</title>

<style>
:root{
--bg:#f0f4f8;
--panel:#fff;
--accent:#3182ce;
--accent-soft:#ebf8ff;
--border:#e2e8f0;
}

body{
font-family:Segoe UI,system-ui;
background:var(--bg);
margin:0;
padding:30px 18px 120px;
display:flex;
justify-content:center;
touch-action:manipulation;
overflow-x:hidden;
}

.container{
width:100%;
max-width:900px;
}

.panel{
background:#fff;
border:1px solid var(--border);
border-radius:16px;
padding:24px;
box-shadow:0 10px 25px rgba(0,0,0,.03);
min-height:650px;
}

h3{
font-size:.75rem;
letter-spacing:1px;
text-transform:uppercase;
color:var(--accent);
margin:0 0 20px;
border-bottom:2px solid var(--accent-soft);
padding-bottom:8px;
}

#sequence{
min-height:500px;
}

.step{
background:#fff;
border:1px solid var(--border);
border-left:6px solid var(--accent);
border-radius:8px;
padding:12px 16px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.slot{
display:inline-flex;
align-items:center;
justify-content:center;
background:#f7fafc;
border:2px dashed #cbd5e0;
border-radius:6px;
min-width:95px;
height:34px;
margin-left:12px;
font-size:.7rem;
cursor:pointer;
transition:.2s;
}

.slot.active{
background:var(--accent);
border-color:var(--accent);
color:#fff;
font-weight:700;
}

.value-pill{
display:inline-flex;
align-items:center;
justify-content:center;
margin-left:12px;
padding:7px 16px;
background:#f7fafc;
border:2px solid #cbd5e0;
border-radius:8px;
cursor:pointer;
font-weight:700;
min-width:55px;
}

.value-pill.active{
background:var(--accent);
border-color:var(--accent);
color:white;
}

.del-btn{
background:none;
border:none;
font-size:24px;
cursor:pointer;
color:#cbd5e0;
}

/* movable fab */
#fab{
position:fixed;
right:24px;
bottom:24px;
background:var(--accent);
color:#fff;
border:none;
border-radius:60px;
padding:18px 24px;
font-size:18px;
font-weight:700;
box-shadow:0 12px 30px rgba(0,0,0,.25);
cursor:grab;
z-index:5000;
user-select:none;
touch-action:none;
}

#fab.dragging{
cursor:grabbing;
transform:scale(1.04);
}

/* library */
#libraryOverlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.18);
z-index:2500;
}

#librarySheet{
position:absolute;
left:0;
right:0;
bottom:0;
background:white;
padding:28px;
border-radius:24px 24px 0 0;
max-height:75vh;
overflow:auto;
box-shadow:0 -8px 30px rgba(0,0,0,.15);
}

.block{
background:white;
border:1px solid var(--border);
border-radius:10px;
padding:16px;
margin-bottom:14px;
font-weight:600;
cursor:pointer;
}

.block:hover{
background:var(--accent-soft);
}

.num-block{
border:2px dashed var(--accent);
background:var(--accent-soft);
text-align:center;
color:var(--accent);
font-weight:700;
}

.clear-btn{
width:100%;
margin-top:18px;
padding:12px;
border:none;
border-radius:8px;
background:#edf2f7;
font-weight:600;
cursor:pointer;
}

/* editor */
#editorOverlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.15);
z-index:4000;
}

#editorSheet{
position:absolute;
left:0;
right:0;
bottom:0;
background:white;
padding:28px;
border-radius:22px 22px 0 0;
text-align:center;
}

.editorValue{
font-size:48px;
font-weight:700;
margin-bottom:18px;
}

.editorBtns{
display:flex;
justify-content:center;
gap:18px;
}

.editBtn{
width:72px;
height:72px;
border:none;
border-radius:18px;
background:var(--accent);
color:white;
font-size:38px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
<div class="panel">

<h3>Active Sequence</h3>

<div id="sequence"></div>

</div>
</div>


<button id="fab">
＋ Blocks
</button>


<div id="libraryOverlay"
onclick="closeLibrary()">
<div id="librarySheet"
onclick="event.stopPropagation()">

<h3>Block Library</h3>

<div class="block"
onclick="quickAdd('Get Sensor Value')">
Get Sensor Value
</div>

<div class="block"
onclick="quickAdd('Rest for')">
Rest for
</div>

<h3 style="margin-top:30px">
Data Types
</h3>

<div class="block num-block"
onclick="tapNumberFill()">
NUMBER
</div>

<button class="clear-btn"
onclick="clearAll()">
Clear All
</button>

</div>
</div>



<div id="editorOverlay"
onclick="closeEditor()">
<div id="editorSheet"
onclick="event.stopPropagation()">

<div style="
opacity:.6;
margin-bottom:12px;">
Adjust Value
</div>

<div id="editorValue"
class="editorValue">
0
</div>

<div class="editorBtns">
<button class="editBtn"
onclick="adjustEditor(-1)">
−
</button>

<button class="editBtn"
onclick="adjustEditor(1)">
+
</button>
</div>

</div>
</div>


<script>
let steps=[];
let selectedSlot=null;
let editingIndex=null;

/* library */

function openLibrary(){
document.getElementById(
"libraryOverlay"
).style.display="block";
}

function closeLibrary(){
document.getElementById(
"libraryOverlay"
).style.display="none";
}

function toggleLibrary(){

let overlay=
document.getElementById(
"libraryOverlay"
);

if(
overlay.style.display==="block"
){
closeLibrary();
}else{
openLibrary();
}
}

/* movable fab */
const fab=
document.getElementById("fab");

let draggingFab=false;
let movedFab=false;
let offsetX=0;
let offsetY=0;

function startFab(x,y){

const r=
fab.getBoundingClientRect();

draggingFab=true;
movedFab=false;

offsetX=x-r.left;
offsetY=y-r.top;

fab.classList.add(
"dragging"
);
}

function moveFab(x,y){

if(!draggingFab)return;

movedFab=true;

let left=
x-offsetX;

let top=
y-offsetY;

const maxX=
window.innerWidth-
fab.offsetWidth;

const maxY=
window.innerHeight-
fab.offsetHeight;

left=Math.max(
0,
Math.min(left,maxX)
);

top=Math.max(
0,
Math.min(top,maxY)
);

fab.style.left=
left+"px";

fab.style.top=
top+"px";

fab.style.right="auto";
fab.style.bottom="auto";
}

function endFab(){

if(!draggingFab)return;

draggingFab=false;

fab.classList.remove(
"dragging"
);

setTimeout(()=>{
if(!movedFab){
toggleLibrary();
}
},10);
}

fab.addEventListener(
"mousedown",
e=>startFab(
e.clientX,
e.clientY
)
);

document.addEventListener(
"mousemove",
e=>moveFab(
e.clientX,
e.clientY
)
);

document.addEventListener(
"mouseup",
endFab
);

fab.addEventListener(
"touchstart",
e=>{
let t=e.touches[0];
startFab(
t.clientX,
t.clientY
);
},
{passive:true}
);

document.addEventListener(
"touchmove",
e=>{
let t=e.touches[0];
moveFab(
t.clientX,
t.clientY
);
},
{passive:false}
);

document.addEventListener(
"touchend",
endFab
);


/* functions */

function quickAdd(label){
steps.push({
label,
value:null
});

closeLibrary();
render();
}

/* HERE UPDATED:
clicking drop number auto opens block library */
function selectSlot(i,e){
e.stopPropagation();

selectedSlot=i;

openLibrary(); /* auto pop library */

render();
}

function tapNumberFill(){

if(
selectedSlot!==null &&
steps[selectedSlot].value===null
){

steps[selectedSlot].value=0;

selectedSlot=null;

closeLibrary();

render();
}
}


/* editor */

function openEditor(i,e){

e.stopPropagation();

editingIndex=i;

document.getElementById(
"editorValue"
).innerText=
steps[i].value;

document.getElementById(
"editorOverlay"
).style.display="block";

render();
}

function adjustEditor(a){

steps[editingIndex].value=
Math.max(
0,
steps[editingIndex].value+a
);

document.getElementById(
"editorValue"
).innerText=
steps[editingIndex].value;

render();
}

function closeEditor(){

editingIndex=null;

document.getElementById(
"editorOverlay"
).style.display="none";

render();
}

function removeStep(i){
steps.splice(i,1);
render();
}

function clearAll(){

if(confirm(
"Start a new sequence?"
)){
steps=[];
render();
}
}

document.addEventListener(
"click",
()=>{
selectedSlot=null;
render();
}
);


/* render */

function render(){

const seq=
document.getElementById(
"sequence"
);

seq.innerHTML="";

if(!steps.length){

seq.innerHTML=
`
<div style="
text-align:center;
margin-top:120px;
padding:50px;
border:2px dashed #e2e8f0;
border-radius:12px;
color:#a0aec0;">
Tap + Blocks to begin
</div>
`;

}

steps.forEach((step,i)=>{

let row=
document.createElement(
"div"
);

row.className="step";

let valDisplay="";

if(step.value===null){

valDisplay=
`
<div
class="slot
${selectedSlot===i?'active':''}"
onclick="
selectSlot(${i},event)
">
drop number
</div>
`;

}else{

valDisplay=
`
<div
class="value-pill
${editingIndex===i?'active':''}"
onclick="
openEditor(${i},event)
">
${step.value}
</div>
`;

}

row.innerHTML=
`
<div style="
display:flex;
align-items:center;">
<span>
${step.label}
</span>

${valDisplay}
</div>

<button
class="del-btn"
onclick="
removeStep(${i})
">
&times;
</button>
`;

seq.appendChild(row);

});

}

render();
</script>

</body>
</html>
