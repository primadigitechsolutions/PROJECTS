<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Arduino Builder Touch</title>

<style>
:root{
--bg:#f0f4f8;
--panel:#fff;
--accent:#3182ce;
--soft:#ebf8ff;
--border:#e2e8f0;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:Segoe UI,system-ui;
background:var(--bg);
padding:20px 16px 120px;
touch-action:manipulation;
user-select:none;
}

.container{
max-width:900px;
margin:auto;
}

.panel{
background:#fff;
border:1px solid var(--border);
border-radius:18px;
padding:22px;
min-height:650px;
box-shadow:0 10px 30px rgba(0,0,0,.04);
}

h3{
margin:0 0 20px;
font-size:.8rem;
letter-spacing:1px;
text-transform:uppercase;
color:var(--accent);
border-bottom:2px solid var(--soft);
padding-bottom:8px;
}

.step{
background:white;
border:1px solid var(--border);
border-left:6px solid var(--accent);
border-radius:10px;
padding:14px 16px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.slot{
display:inline-flex;
align-items:center;
justify-content:center;
margin-left:12px;
min-width:100px;
height:36px;
border-radius:8px;
border:2px dashed #cbd5e0;
background:#f7fafc;
font-size:12px;
font-weight:600;
}

.slot.active{
background:var(--accent);
border-color:var(--accent);
color:white;
}

.value-pill{
margin-left:12px;
padding:8px 16px;
border-radius:9px;
border:2px solid #cbd5e0;
font-weight:700;
min-width:58px;
text-align:center;
}

.value-pill.active{
background:var(--accent);
border-color:var(--accent);
color:#fff;
}

.del-btn{
font-size:24px;
color:#cbd5e0;
padding:6px 10px;
}

/* FAB */
#fab{
position:fixed;
right:24px;
bottom:24px;
background:var(--accent);
color:white;
padding:18px 24px;
border-radius:60px;
font-weight:700;
box-shadow:0 12px 28px rgba(0,0,0,.25);
z-index:5000;
touch-action:none;
}

#fab.dragging{
transform:scale(1.05);
}

/* library */
#libraryOverlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.18);
z-index:3000;
}

#librarySheet{
position:absolute;
left:0;
right:0;
bottom:0;
background:#fff;
padding:28px;
border-radius:24px 24px 0 0;
max-height:75vh;
overflow:auto;
}

.block{
background:white;
border:1px solid var(--border);
border-radius:12px;
padding:18px;
font-weight:600;
margin-bottom:14px;
}

.num-block{
border:2px dashed var(--accent);
background:var(--soft);
text-align:center;
color:var(--accent);
font-weight:700;
}

.clear-btn{
width:100%;
margin-top:18px;
padding:14px;
border:none;
border-radius:10px;
background:#edf2f7;
font-weight:700;
}

/* editor */
#editorOverlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.15);
z-index:4000;
}

#editorSheet{
position:absolute;
left:0;
right:0;
bottom:0;
background:white;
padding:28px;
border-radius:24px 24px 0 0;
text-align:center;
}

.editorValue{
font-size:54px;
font-weight:700;
margin:18px 0;
}

.editorBtns{
display:flex;
justify-content:center;
gap:20px;
}

.editBtn{
width:80px;
height:80px;
border-radius:18px;
background:var(--accent);
color:white;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
}

.empty{
text-align:center;
margin-top:120px;
padding:50px;
border:2px dashed #e2e8f0;
border-radius:12px;
color:#a0aec0;
}
</style>
</head>
<body>

<div class="container">
<div class="panel">
<h3>Active Sequence</h3>
<div id="sequence"></div>
</div>
</div>


<div id="fab">
＋ Blocks
</div>


<div id="libraryOverlay">
<div id="librarySheet">

<h3>Block Library</h3>

<div class="block"
ontouchstart="quickAdd('Get Sensor Value')"
onclick="quickAdd('Get Sensor Value')">
Get Sensor Value
</div>

<div class="block"
ontouchstart="quickAdd('Rest for')"
onclick="quickAdd('Rest for')">
Rest for
</div>

<h3 style="margin-top:30px">
Data Types
</h3>

<div class="block num-block"
ontouchstart="tapNumberFill()"
onclick="tapNumberFill()">
NUMBER
</div>

<div class="clear-btn"
ontouchstart="clearAll()"
onclick="clearAll()">
Clear All
</div>

</div>
</div>



<div id="editorOverlay">
<div id="editorSheet">

<div style="opacity:.6">
Adjust Value
</div>

<div id="editorValue"
class="editorValue">
0
</div>

<div class="editorBtns">
<div class="editBtn"
ontouchstart="adjustEditor(-1)"
onclick="adjustEditor(-1)">
−
</div>

<div class="editBtn"
ontouchstart="adjustEditor(1)"
onclick="adjustEditor(1)">
+
</div>
</div>

</div>
</div>



<script>
let steps=[];
let selectedSlot=null;
let editingIndex=null;


/* library */

function openLibrary(){
document.getElementById(
"libraryOverlay"
).style.display="block";
}

function closeLibrary(){
document.getElementById(
"libraryOverlay"
).style.display="none";
}

function toggleLibrary(){

let o=
document.getElementById(
"libraryOverlay"
);

if(
o.style.display==="block"
){
closeLibrary();
}else{
openLibrary();
}

}


/* tap outside closes */

document.getElementById(
"libraryOverlay"
).addEventListener(
"touchstart",
function(e){
if(e.target===this){
closeLibrary();
}
}
);

document.getElementById(
"editorOverlay"
).addEventListener(
"touchstart",
function(e){
if(e.target===this){
closeEditor();
}
}
);



/* movable FAB touch */
const fab=
document.getElementById("fab");

let drag=false;
let moved=false;
let ox=0;
let oy=0;

function startDrag(x,y){

const r=
fab.getBoundingClientRect();

drag=true;
moved=false;

ox=x-r.left;
oy=y-r.top;

fab.classList.add(
"dragging"
);
}

function moveDrag(x,y){

if(!drag) return;

moved=true;

let left=x-ox;
let top=y-oy;

left=Math.max(
0,
Math.min(
left,
window.innerWidth-fab.offsetWidth
));

top=Math.max(
0,
Math.min(
top,
window.innerHeight-fab.offsetHeight
));

fab.style.left=
left+"px";

fab.style.top=
top+"px";

fab.style.right="auto";
fab.style.bottom="auto";
}

function endDrag(){

if(!drag) return;

drag=false;

fab.classList.remove(
"dragging"
);

setTimeout(()=>{
if(!moved){
toggleLibrary();
}
},10);

}

fab.addEventListener(
"touchstart",
e=>{
let t=e.touches[0];
startDrag(
t.clientX,
t.clientY
);
},
{passive:true}
);

document.addEventListener(
"touchmove",
e=>{
let t=e.touches[0];
moveDrag(
t.clientX,
t.clientY
);
},
{passive:false}
);

document.addEventListener(
"touchend",
endDrag
);



/* sequence */

function quickAdd(label){

steps.push({
label,
value:null
});

closeLibrary();

render();
}

function selectSlot(i){

selectedSlot=i;

openLibrary();

render();
}

function tapNumberFill(){

if(
selectedSlot!==null &&
steps[selectedSlot].value===null
){
steps[selectedSlot].value=0;

selectedSlot=null;

closeLibrary();

render();
}
}


/* editor */

function openEditor(i){

editingIndex=i;

document.getElementById(
"editorValue"
).innerText=
steps[i].value;

document.getElementById(
"editorOverlay"
).style.display="block";

render();
}

function adjustEditor(a){

steps[editingIndex].value=
Math.max(
0,
steps[editingIndex].value+a
);

document.getElementById(
"editorValue"
).innerText=
steps[editingIndex].value;

render();
}

function closeEditor(){

editingIndex=null;

document.getElementById(
"editorOverlay"
).style.display="none";

render();
}


function removeStep(i){
steps.splice(i,1);
render();
}

function clearAll(){

if(confirm(
"Start new sequence?"
)){
steps=[];
render();
}
}


/* render */

function render(){

let seq=
document.getElementById(
"sequence"
);

seq.innerHTML="";

if(!steps.length){

seq.innerHTML=
`
<div class='empty'>
Tap + Blocks to begin
</div>
`;

}

steps.forEach((s,i)=>{

let row=
document.createElement("div");

row.className="step";

let val="";

if(s.value===null){

val=
`
<div
class="slot ${selectedSlot===i?'active':''}"
ontouchstart="
selectSlot(${i})
"
onclick="
selectSlot(${i})
">
drop number
</div>
`;

}else{

val=
`
<div
class="value-pill
${editingIndex===i?'active':''}"
ontouchstart="
openEditor(${i})
"
onclick="
openEditor(${i})
">
${s.value}
</div>
`;

}

row.innerHTML=
`
<div style="
display:flex;
align-items:center;
">
<span>
${s.label}
</span>

${val}
</div>

<div
class="del-btn"
ontouchstart="
removeStep(${i})
"
onclick="
removeStep(${i})
">
×
</div>
`;

seq.appendChild(
row
);

});

}

render();
</script>

</body>
</html>
