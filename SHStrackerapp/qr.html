<!DOCTYPE html>
<html lang="en">
<head>
    <title>Auto-Crop QR Code</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        canvas { border: 2px solid #333; border-radius: 8px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h2>QR Code Auto-Cropper</h2>
    <input type="file" id="upload" accept="image/*">
    
    <p>Original Scan (Hidden):</p>
    <canvas id="sourceCanvas" class="hidden"></canvas>

    <p>Cropped Result:</p>
    <canvas id="destCanvas"></canvas>

    <script>
        const upload = document.getElementById('upload');
        const sourceCanvas = document.getElementById('sourceCanvas');
        const destCanvas = document.getElementById('destCanvas');
        const sCtx = sourceCanvas.getContext('2d');
        const dCtx = destCanvas.getContext('2d');

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    // 1. Draw original image to hidden canvas
                    sourceCanvas.width = img.width;
                    sourceCanvas.height = img.height;
                    sCtx.drawImage(img, 0, 0);

                    // 2. Get image data for jsQR to analyze
                    const imageData = sCtx.getImageData(0, 0, img.width, img.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);

                    if (code) {
                        const { x, y, width, height } = code.location.topLeftCorner; 
                        // Note: jsQR provides corner points; we calculate dimensions:
                        const qrWidth = code.location.topRightCorner.x - x;
                        const qrHeight = code.location.bottomLeftCorner.y - y;
                        
                        // Adding a small padding (10px) so the crop isn't too tight
                        const padding = 10;

                        // 3. Set destination canvas to QR size and draw the crop
                        destCanvas.width = qrWidth + (padding * 2);
                        destCanvas.height = qrHeight + (padding * 2);
                        
                        dCtx.drawImage(
                            img, 
                            x - padding, y - padding, qrWidth + (padding * 2), qrHeight + (padding * 2), // Source rect
                            0, 0, qrWidth + (padding * 2), qrHeight + (padding * 2) // Dest rect
                        );
                        console.log("QR Code found and cropped!");
                    } else {
                        alert("No QR code detected in this image.");
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
