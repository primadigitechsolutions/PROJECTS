<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Image Compressor</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 2rem auto; background: #fafafa; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        img { width: 100%; border-radius: 8px; border: 1px solid #eee; margin-top: 10px; }
        .stat-box { background: #e9ecef; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; margin: 10px 0; }
        .reduction { color: #28a745; }
        input[type="range"] { width: 100%; margin: 10px 0; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Advanced Compression Settings</h2>
        <label>Step 1: Choose Image</label><br>
        <input type="file" id="upload" accept="image/*"><br><br>

        <label>Step 2: Max Width (Pixels): <span id="widthVal">1200</span>px</label>
        <input type="range" id="maxWidth" min="400" max="3000" step="100" value="1200">

        <label>Step 3: Quality: <span id="qualityVal">0.6</span></label>
        <input type="range" id="quality" min="0.1" max="1.0" step="0.1" value="0.6">
    </div>

    <div class="grid">
        <div class="card">
            <h3>Original</h3>
            <div id="origSize" class="stat-box">Size: -</div>
            <img id="origImg">
        </div>
        <div class="card">
            <h3>Compressed (WebP)</h3>
            <div id="compSize" class="stat-box">Size: -</div>
            <div id="savings" class="reduction"></div>
            <img id="compImg">
            <button id="dlBtn" style="display:none; margin-top:15px;">Download .WebP</button>
        </div>
    </div>

<script>
    const el = (id) => document.getElementById(id);
    let currentFile = null;

    const updateLabel = (id, val) => el(id).innerText = val;

    [el('quality'), el('maxWidth')].forEach(input => {
        input.addEventListener('input', () => {
            updateLabel(input.id + 'Val', input.value);
            if(currentFile) process();
        });
    });

    el('upload').addEventListener('change', (e) => {
        currentFile = e.target.files[0];
        if(currentFile) {
            el('origSize').innerText = `Size: ${(currentFile.size / 1024).toFixed(1)} KB`;
            el('origImg').src = URL.createObjectURL(currentFile);
            process();
        }
    });

    function process() {
        const reader = new FileReader();
        reader.readAsDataURL(currentFile);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                
                // CRITICAL: Resizing logic for "More" compression
                let width = img.width;
                let height = img.height;
                const maxW = parseInt(el('maxWidth').value);

                if (width > maxW) {
                    height = height * (maxW / width);
                    width = maxW;
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                // Use 'image/webp' for superior compression over 'image/jpeg'
                const quality = parseFloat(el('quality').value);
                const dataUrl = canvas.toDataURL('image/webp', quality);
                
                el('compImg').src = dataUrl;
                
                // Calculate size
                const sizeInBytes = Math.round((dataUrl.length - 22) * 3 / 4);
                const sizeKb = (sizeInBytes / 1024).toFixed(1);
                el('compSize').innerText = `Size: ${sizeKb} KB`;

                // Calculate % savings
                const savings = Math.round((1 - (sizeInBytes / currentFile.size)) * 100);
                el('savings').innerText = savings > 0 ? `Reduced by ${savings}%` : "";

                el('dlBtn').style.display = 'block';
                el('dlBtn').onclick = () => {
                    const a = document.createElement('a');
                    a.href = dataUrl;
                    a.download = "optimized.webp";
                    a.click();
                };
            };
        };
    }
</script>
</body>
</html>
