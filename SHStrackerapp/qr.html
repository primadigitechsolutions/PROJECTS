<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vislexia Landing Page</title>
    <style>
        /* Modern reset and font imports */
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Lexend', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Gradient and Bokeh Background Effect */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #d9e7e9 0%, #ffffff 100%);
            z-index: -1;
        }

        /* Simulated Bokeh circles */
        .bokeh {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.5;
        }

        .circle-1 { width: 300px; height: 300px; background: #fff; top: 10%; left: 15%; }
        .circle-2 { width: 200px; height: 200px; background: #fce4ec; top: 15%; right: 20%; }
        .circle-3 { width: 250px; height: 250px; background: #fff; bottom: 10%; left: 5%; }
        .circle-4 { width: 150px; height: 150px; background: #e3f2fd; bottom: 20%; right: 10%; }

        /* Main Container */
        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        /* Title Styling with subtle glow */
        h1 {
            font-size: 5rem;
            font-weight: 800;
            color: white;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.3);
            padding: 10px 40px;
            border-radius: 50px;
            display: inline-block;
            backdrop-filter: blur(5px);
        }

        /* Subtitle Styling */
        p {
            font-size: 1.2rem;
            font-weight: 700;
            color: #333;
            margin-top: 20px;
            line-height: 1.3;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Button Styling */
        .start-btn {
            margin-top: 30px;
            background-color: #6a8d9d; /* Muted blue-grey from image */
            color: white;
            border: none;
            padding: 15px 80px;
            font-size: 1.8rem;
            font-weight: 800;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .start-btn:hover {
            background-color: #5a7a8a;
            transform: scale(1.05);
        }

        .start-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="background">
        <div class="bokeh circle-1"></div>
        <div class="bokeh circle-2"></div>
        <div class="bokeh circle-3"></div>
        <div class="bokeh circle-4"></div>
    </div>

    <div class="container">
        <h1>VISLEXIA</h1>
        <p>Early Dyslexia Detection System via Eye-Tracking Analysis and Gamified Activities for Primary Students</p>
        <button class="start-btn">START</button>
    </div>

</body>
</html>
