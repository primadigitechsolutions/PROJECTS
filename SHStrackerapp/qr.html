<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auto-Max Image Compressor</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px; background: #f0f2f5; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .box { border: 2px dashed #ccc; padding: 20px; margin: 20px 0; cursor: pointer; }
        .box:hover { border-color: #007bff; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 8px; }
        .savings { color: #28a745; font-weight: bold; font-size: 1.2rem; }
        button { background: #28a745; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 1rem; cursor: pointer; display: none; margin: auto; }
        img { max-width: 100%; height: auto; margin-top: 15px; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Auto-Max Compressor</h2>
    <p>Upload any image to instantly shrink it to the smallest possible size.</p>
    
    <div class="box" onclick="document.getElementById('fileInput').click()">
        Click to Upload Image
        <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <strong>Original</strong>
            <div id="oldSize">-</div>
        </div>
        <div class="stat-card">
            <strong>Optimized</strong>
            <div id="newSize">-</div>
            <div id="pct" class="savings"></div>
        </div>
    </div>

    <img id="preview">
    <button id="dlBtn">Download Optimized Image</button>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const oldSizeEl = document.getElementById('oldSize');
    const newSizeEl = document.getElementById('newSize');
    const pctEl = document.getElementById('pct');
    const dlBtn = document.getElementById('dlBtn');
    const preview = document.getElementById('preview');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        oldSizeEl.innerText = (file.size / 1024).toFixed(1) + " KB";
        
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                // AUTO-LOGIC: Hard cap width at 1000px for massive savings
                let width = img.width;
                let height = img.height;
                const MAX_DIM = 1000; 

                if (width > height) {
                    if (width > MAX_DIM) {
                        height *= MAX_DIM / width;
                        width = MAX_DIM;
                    }
                } else {
                    if (height > MAX_DIM) {
                        width *= MAX_DIM / height;
                        height = MAX_DIM;
                    }
                }

                canvas.width = width;
                canvas.height = height;
                ctx.drawImage(img, 0, 0, width, height);

                // QUALITY: Set to 0.4 (Aggressive but decent looking)
                // FORMAT: WebP is 30% smaller than JPG
                const dataUrl = canvas.toDataURL('image/webp', 0.4);
                
                // Calculate size from base64
                const newSizeBytes = Math.round((dataUrl.length - 22) * 3 / 4);
                newSizeEl.innerText = (newSizeBytes / 1024).toFixed(1) + " KB";
                
                // Show % savings
                const savings = Math.round((1 - (newSizeBytes / file.size)) * 100);
                pctEl.innerText = `-${savings}%`;

                // Update UI
                preview.src = dataUrl;
                preview.style.display = "block";
                dlBtn.style.display = "block";
                dlBtn.onclick = () => {
                    const link = document.createElement('a');
                    link.href = dataUrl;
                    link.download = `optimized_${file.name.split('.')[0]}.webp`;
                    link.click();
                };
            };
        };
    });
</script>

</body>
</html>
