<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Grade Overview | Academic Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
   
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f8f4fa;
      color: #2c1e3f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    .phone-frame {
      max-width: 400px; width: 100%; background: white;
      border-radius: 40px; box-shadow: 0 25px 45px -12px rgba(78, 53, 111, 0.2);
      overflow: hidden; height: 92vh; position: relative;
      display: flex; flex-direction: column;
    }
    .header {
      padding: 20px 24px 10px; display: flex;
      justify-content: space-between; align-items: center; flex-shrink: 0;
    }
    .page-title { font-size: 22px; font-weight: 700; color: #2c1e3f; }
    .back-btn { font-size: 24px; cursor: pointer; color: #4E356F; text-decoration: none; padding: 5px; }
    .greeting { font-size: 18px; font-weight: 600; color: #4E356F; margin: 0 24px 15px; }

    .main-content { 
      flex: 1; 
      overflow-y: auto; 
      padding: 0 20px 80px; 
    }

    /* Semester Tabs */
    .semester-tabs {
      display: flex;
      background: #f0e6f0;
      border-radius: 16px;
      padding: 6px;
      margin: 10px 0 20px;
    }
    .tab {
      flex: 1;
      padding: 13px;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: #4E356F;
      color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(78, 53, 111, 0.08);
    }

    th, td {
      padding: 13px 10px;
      text-align: center;
      font-size: 13.5px;
      border-bottom: 1px solid #ecdde6;
    }

    th {
      background: #4E356F;
      color: white;
      font-weight: 600;
    }

    .subject-name {
      text-align: left;
      font-weight: 600;
      color: #2c1e3f;
      padding-left: 14px;
    }

    .grade {
      font-weight: 700;
      color: #4E356F;
      cursor: pointer;
      transition: background 0.2s;
    }

    /* Low grade in table - only text color */
    .grade.low {
      color: #e07a5f !important;
    }

    .final-grade {
      background: #f0e6f0;
      font-weight: 700;
      color: #4E356F;
    }

    .no-data {
      text-align: center;
      color: #888;
      padding: 60px 20px;
      font-size: 15px;
      line-height: 1.5;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 20px;
    }
    .modal-content {
      background: white;
      width: 100%;
      max-width: 340px;
      border-radius: 20px;
      padding: 20px;
      max-height: 70vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #ecdde6;
    }
    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: #4E356F;
    }
    .close-btn {
      font-size: 24px;
      cursor: pointer;
      color: #9C6A82;
    }

    /* Low component in modal */
    .component-title.low {
      color: #e07a5f !important;
    }

    .bottom-nav {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid #e9dee4;
      display: flex; justify-content: space-around; padding: 10px 0 25px;
    }
    .nav-item { 
      display: flex; flex-direction: column; 
      align-items: center; color: #9C6A82; 
      font-size: 11px; cursor: pointer; 
    }
    .nav-icon { font-size: 22px; margin-bottom: 4px; }
  </style>
</head>
<body>
<div class="phone-frame">
  <div class="header">
    <div class="back-btn" onclick="window.location.href='dashboard.html'">←</div>
    <div class="page-title">Grade Overview</div>
    <div style="width:24px;"></div>
  </div>
  <div class="greeting">Hi, <span id="userName">Student</span> 👋</div>

  <div class="main-content">
    <div class="semester-tabs">
      <div class="tab active" id="tabS1" onclick="switchSemester('S1')">1st Semester</div>
      <div class="tab" id="tabS2" onclick="switchSemester('S2')">2nd Semester</div>
    </div>

    <table id="gradeTable">
      <thead>
        <tr>
          <th>Subject</th>
          <th>Q1</th>
          <th>Q2</th>
          <th>Q3</th>
          <th>Q4</th>
          <th>Final</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div id="noDataMessage" class="no-data" style="display:none;">
      No grades recorded yet for this semester.<br>
      Start adding scores in the Grade Tracker.
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='dashboard.html'"><div class="nav-icon">🏠</div>Home</div>
    <div class="nav-item" onclick="window.location.href='tracker.html'"><div class="nav-icon">📊</div>Tracker</div>
    <div class="nav-item" onclick="window.location.href='reviewer.html'"><div class="nav-icon">📄</div>Reviewer</div>
    <div class="nav-item" onclick="window.location.href='profile.html'"><div class="nav-icon">👤</div>Profile</div>
  </div>
</div>

<!-- Preview Modal -->
<div id="previewModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Quarter Preview</div>
      <span class="close-btn" onclick="closeModal()">×</span>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC-E_V2GdszTfWmDZ3bfvRWl_zvXy4OzR8",
    authDomain: "shstrackerapp.firebaseapp.com",
    databaseURL: "https://shstrackerapp-default-rtdb.firebaseio.com",
    projectId: "shstrackerapp",
    storageBucket: "shstrackerapp.firebasestorage.app",
    messagingSenderId: "807451936679",
    appId: "1:807451936679:web:37fa86f3b272afe9505882"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const database = getDatabase(app);

  let currentUserId = null;
  let subjects = {};
  let scores = {};
  let currentSem = localStorage.getItem('lastSem') || 'S1';

  window.switchSemester = function(sem) {
    currentSem = sem;
    localStorage.setItem('lastSem', sem);
    loadOverviewData();
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUserId = user.uid;
      document.getElementById('userName').textContent = user.displayName || user.email?.split('@')[0];
      loadOverviewData();
    } else {
      window.location.href = "login.html";
    }
  });

  function loadOverviewData() {
    onValue(ref(database, `users/${currentUserId}/semesters/${currentSem}/subjects`), (snapshot) => {
      subjects = snapshot.val() || {};
      renderOverview();
    });

    onValue(ref(database, `users/${currentUserId}/trackerScores/${currentSem}`), (snapshot) => {
      scores = snapshot.val() || {};
      renderOverview();
    });

    updateActiveTab();
  }

  function updateActiveTab() {
    document.getElementById('tabS1').classList.toggle('active', currentSem === 'S1');
    document.getElementById('tabS2').classList.toggle('active', currentSem === 'S2');
  }

  function hasAnyScores(subject, quarter) {
    const data = scores[subject]?.[quarter];
    if (!data) return false;
    return ['Quiz', 'Activity', 'PETA', 'Exam'].some(type => 
      data[type] && Object.keys(data[type]).length > 0
    );
  }

  function shouldTreatAsZero(subject, quarter) {
    const qNum = parseInt(quarter.replace('Q', ''));
    for (let next = qNum + 1; next <= 4; next++) {
      if (hasAnyScores(subject, `Q${next}`)) return true;
    }
    return false;
  }

  function calculateQuarterGrade(subject, quarter) {
    const data = scores[subject]?.[quarter];

    if (!data && shouldTreatAsZero(subject, quarter)) return 0;
    if (!data) return null;

    const getAvg = (type) => {
      if (!data[type]) return 0;
      const values = Object.values(data[type]);
      if (values.length === 0) return 0;
      return (values.reduce((a, b) => a + (b.score / b.total), 0) / values.length) * 100;
    };

    const isCore = subjects[subject] === 'core';
    const ww = (getAvg('Quiz') + getAvg('Activity')) / 2;
    const pt = getAvg('PETA');
    const ex = getAvg('Exam');

    const ptW = isCore ? 0.50 : 0.45;
    const exW = isCore ? 0.25 : 0.30;

    return (ww * 0.25) + (pt * ptW) + (ex * exW);
  }

  function shouldShowAsFinal(subject, quarter) {
    if (hasAnyScores(subject, quarter)) return true;
    if (shouldTreatAsZero(subject, quarter)) return true;
    return false;
  }

  // Show Quarter Preview Modal with low component highlighting
  window.showQuarterPreview = function(subject, quarter) {
    const data = scores[subject]?.[quarter];
    const modalTitle = document.getElementById('modalTitle');
    const modalContent = document.getElementById('modalContent');

    modalTitle.textContent = `${subject} - ${quarter} Quarter`;

    if (!data) {
      modalContent.innerHTML = `<p style="text-align:center; color:#888; padding:30px;">No scores recorded in this quarter.</p>`;
    } else {
      let html = '';

      ['Quiz', 'Activity', 'PETA', 'Exam'].forEach(type => {
        if (data[type] && Object.keys(data[type]).length > 0) {
          const avg = calculateComponentAvg(data[type]);
          const isLow = avg < 60;

          html += `
            <div style="margin:18px 0 8px; font-size:13px; font-weight:700; 
                        ${isLow ? 'color:#e07a5f;' : 'color:#6b5a7a;'}">
              ${type} ${isLow ? '(Low)' : ''}
            </div>`;

          Object.keys(data[type]).forEach(key => {
            const entry = data[type][key];
            html += `
              <div style="background:#fcfaff; padding:12px; border-radius:12px; margin-bottom:8px; font-size:13.5px;">
                <strong>${entry.score} / ${entry.total}</strong>
                <div style="font-size:12px; color:#9C6A82; margin-top:3px;">${entry.date}</div>
              </div>`;
          });
        }
      });

      modalContent.innerHTML = html || `<p style="text-align:center; color:#888; padding:30px;">No entries yet.</p>`;
    }

    document.getElementById('previewModal').style.display = 'flex';
  };

  // Helper to calculate average of a component
  function calculateComponentAvg(entries) {
    if (!entries || Object.keys(entries).length === 0) return 0;
    const values = Object.values(entries);
    return (values.reduce((a, b) => a + (b.score / b.total), 0) / values.length) * 100;
  }

  window.closeModal = function() {
    document.getElementById('previewModal').style.display = 'none';
  };

  function renderOverview() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    const subjectList = Object.keys(subjects).sort();

    if (subjectList.length === 0) {
      document.getElementById('noDataMessage').style.display = 'block';
      return;
    }

    document.getElementById('noDataMessage').style.display = 'none';

    subjectList.forEach(subject => {
      const row = document.createElement('tr');
      let html = `<td class="subject-name">${subject}</td>`;

      for (let q = 1; q <= 4; q++) {
        const quarter = `Q${q}`;
        const grade = calculateQuarterGrade(subject, quarter);

        if (grade !== null) {
          const isFinal = shouldShowAsFinal(subject, quarter);
          const isLow = isFinal && grade < 60;

          let className = 'grade';
          if (isLow) className += ' low';

          html += `<td class="${className}" onclick="showQuarterPreview('${subject}', '${quarter}')">${grade.toFixed(1)}</td>`;
        } else {
          html += `<td style="color:#ccc;">—</td>`;
        }
      }

      const finalGrade = calculateFinalGrade(subject);
      html += `<td class="final-grade">${finalGrade ? finalGrade.toFixed(1) : '—'}</td>`;

      row.innerHTML = html;
      tbody.appendChild(row);
    });
  }

  function calculateFinalGrade(subject) {
    let total = 0;
    let count = 0;
    for (let q = 1; q <= 4; q++) {
      const grade = calculateQuarterGrade(subject, `Q${q}`);
      if (grade !== null) {
        total += grade;
        count++;
      }
    }
    return count > 0 ? total / count : null;
  }
</script>
</body>
</html>
