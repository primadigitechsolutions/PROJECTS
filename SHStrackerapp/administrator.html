<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Administrator Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f8f4fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 10px;
    }
    .phone-frame {
      width: 100%; max-width: 400px; height: 92vh;
      background: white; border-radius: 40px;
      box-shadow: 0 25px 45px -12px rgba(78, 53, 111, 0.2);
      overflow: hidden; display: flex; flex-direction: column; position: relative;
    }
    .header { 
      padding: 24px 24px 12px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      background: white;
      border-bottom: 1px solid #f0e6f5;
    }
    .greeting { 
      font-size: 22px; 
      font-weight: 700; 
      color: #2c1e3f; 
    }
    .greeting .role { 
      color: #EF9875; 
      font-size: 18px;
    }
    .profile-circle {
      width: 42px; height: 42px;
      background: #5E3A7E;
      color: white; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 10px rgba(94, 58, 126, 0.2);
    }
    .main-content { 
      flex: 1; 
      overflow-y: auto; 
      padding: 20px 20px 80px;
      background: #f8f4fa;
    }
    .search-bar {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #f0e6f5;
      border-radius: 14px;
      font-size: 15px;
      margin-bottom: 20px;
      background: white;
    }
    .user-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .user-card {
      background: white;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 6px 20px rgba(78, 53, 111, 0.06);
      border: 1px solid #f0e6f5;
    }
    .user-card:active { transform: scale(0.97); }
    .user-name { font-size: 17px; font-weight: 700; color: #2c1e3f; margin-bottom: 4px; }
    .user-email { font-size: 13px; color: #666; margin-bottom: 12px; }
    .premium-status {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .no-premium { background: #ffebee; color: #e07a5f; }
    .active-premium { background: #e8f5e9; color: #4caf50; }
    .lifetime { background: linear-gradient(90deg, #EF9875, #e07a5f); color: white; }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      width: 100%;
    }
    .btn-premium { background: #5E3A7E; color: white; }

    .dropdown-content {
      display: none; position: absolute; right: 20px; top: 75px;
      background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border-radius: 16px; width: 200px; z-index: 1000; 
      border: 1px solid #f0e6f5; overflow: hidden;
    }
    .dropdown-content.show { display: block; animation: fadeIn 0.2s ease; }
    .dropdown-item { 
      padding: 14px 18px; 
      font-size: 14px; 
      cursor: pointer; 
      color: #2c1e3f; 
      font-weight: 600; 
    }
    .dropdown-item:active { background: #f8f4fa; }

    /* Modal Styles */
    .modal {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); align-items: center; justify-content: center; 
      z-index: 2000; backdrop-filter: blur(4px);
    }
    .modal-content {
      background: white; width: 90%; max-width: 360px; border-radius: 28px;
      padding: 25px; animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal h3 { color: #5E3A7E; margin-bottom: 15px; text-align: center; }
    .qr-preview {
      width: 100%;
      max-height: 280px;
      border: 2px solid #f0e6f5;
      border-radius: 16px;
      object-fit: contain;
      background: #f8f4fa;
      margin: 15px 0;
    }
    .upload-btn {
      background: #EF9875;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      width: 100%;
      margin-top: 10px;
      cursor: pointer;
    }
    .no-qr { text-align: center; color: #888; font-style: italic; padding: 40px 0; }
    
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #666; }
    select, input[type="date"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .modal-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
    .btn-cancel { background: #eee; }
    .btn-confirm { background: #5E3A7E; color: white; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="header">
      <div>
        <div class="greeting">Admin Panel <span class="role">👑</span></div>
      </div>
      <div class="profile-circle" id="profileBtn">A</div>
      
      <div class="dropdown-content" id="dropdownMenu">
        <div class="dropdown-item" id="settingsBtn">⚙️ Settings</div>
        <div class="dropdown-item" style="color:#e07a5f; border-top:1px solid #f0e6f5" id="logoutBtn">🚪 Sign Out</div>
      </div>
    </div>

    <div class="main-content">
      <input type="text" id="searchInput" class="search-bar" placeholder="Search by name or email...">
      <div class="user-grid" id="userGrid"></div>
    </div>
  </div>

  <div id="premiumModal" class="modal">
    <div class="modal-content">
      <h3>Set Premium for <span id="modalUserName"></span></h3>
      <div class="form-group">
        <label>Premium Type</label>
        <select id="premiumType">
          <option value="none">No Premium</option>
          <option value="date">Premium until specific date</option>
          <option value="lifetime">Lifetime Premium</option>
        </select>
      </div>
      <div class="form-group" id="dateGroup" style="display:none;">
        <label>Expires On</label>
        <input type="date" id="expiryDate">
      </div>
      <div class="modal-buttons">
        <button class="modal-btn btn-cancel" onclick="closePremiumModal()">Cancel</button>
        <button class="modal-btn btn-confirm" onclick="savePremium()">Save Changes</button>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="modal">
    <div class="modal-content">
      <h3>Payment QR Code</h3>
      
      <div id="qrPreviewContainer">
        <img id="qrPreview" class="qr-preview" src="" alt="Payment QR Code" style="display:none;">
        <div id="noQrMessage" class="no-qr">No QR code uploaded yet</div>
      </div>

      <input type="file" id="qrUpload" accept="image/*" style="display:none;">
      <button class="upload-btn" onclick="document.getElementById('qrUpload').click()">
        📤 Upload QR
      </button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC-E_V2GdszTfWmDZ3bfvRWl_zvXy4OzR8",
      authDomain: "shstrackerapp.firebaseapp.com",
      databaseURL: "https://shstrackerapp-default-rtdb.firebaseio.com",
      projectId: "shstrackerapp",
      storageBucket: "shstrackerapp.firebasestorage.app",
      messagingSenderId: "807451936679",
      appId: "1:807451936679:web:37fa86f3b272afe9505882"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    let currentUserId = null;
    let allUsers = {};

    function loadAllUsers() {
      const usersRef = ref(database, 'users');
      onValue(usersRef, (snapshot) => {
        allUsers = snapshot.val() || {};
        renderUsers(allUsers);
      });
    }

    function renderUsers(users) {
      const grid = document.getElementById('userGrid');
      grid.innerHTML = '';

      Object.entries(users).forEach(([uid, userData]) => {
        const name = userData.name || "No Name";
        const email = userData.email || "No Email";

        let premiumHTML = `<span class="premium-status no-premium">No Premium</span>`;
        if (userData.premium === -1) {
          premiumHTML = `<span class="premium-status lifetime">Lifetime Premium</span>`;
        } else if (typeof userData.premium === 'number' && userData.premium > Date.now()) {
          const date = new Date(userData.premium).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          premiumHTML = `<span class="premium-status active-premium">Until ${date}</span>`;
        }

        const card = document.createElement('div');
        card.className = 'user-card';
        card.innerHTML = `
          <div class="user-name">${name}</div>
          <div class="user-email">${email}</div>
          ${premiumHTML}
          <button class="btn btn-premium" onclick="openPremiumModal('${uid}', '${name.replace(/'/g, "\\'")}')">Manage Premium</button>
        `;
        grid.appendChild(card);
      });
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase().trim();
      const filtered = Object.fromEntries(
        Object.entries(allUsers).filter(([_, u]) => 
          (u.name || "").toLowerCase().includes(term) || 
          (u.email || "").toLowerCase().includes(term)
        )
      );
      renderUsers(filtered);
    });

    // Premium Modal Functions
    window.openPremiumModal = function(uid, name) {
      currentUserId = uid;
      document.getElementById('modalUserName').textContent = name;
      document.getElementById('premiumModal').style.display = 'flex';
      document.getElementById('dateGroup').style.display = 'none';
      document.getElementById('premiumType').value = 'none';
    };

    window.closePremiumModal = () => {
      document.getElementById('premiumModal').style.display = 'none';
    };

    document.getElementById('premiumType').addEventListener('change', function() {
      document.getElementById('dateGroup').style.display = this.value === 'date' ? 'block' : 'none';
    });

    window.savePremium = function() {
      if (!currentUserId) return;
      const type = document.getElementById('premiumType').value;
      let premiumValue = null;
      if (type === 'lifetime') premiumValue = -1;
      else if (type === 'date') {
        const d = document.getElementById('expiryDate').value;
        if (d) premiumValue = new Date(d).getTime();
      }

      update(ref(database), { [`users/${currentUserId}/premium`]: premiumValue })
        .then(() => {
          closePremiumModal();
          loadAllUsers();
        })
        .catch(err => console.error("Update error:", err));
    };

    // Settings Modal + Silent QR Compression
    function loadCurrentQR() {
      const qrRef = ref(database, 'settings/qrpayment');
      onValue(qrRef, (snapshot) => {
        const qrBase64 = snapshot.val();
        const img = document.getElementById('qrPreview');
        const noMsg = document.getElementById('noQrMessage');

        if (qrBase64) {
          img.src = qrBase64;
          img.style.display = 'block';
          noMsg.style.display = 'none';
        } else {
          img.style.display = 'none';
          noMsg.style.display = 'block';
        }
      }, { onlyOnce: true });
    }

    document.getElementById('qrUpload').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const sourceCanvas = document.createElement('canvas');
          const sCtx = sourceCanvas.getContext('2d');
          sourceCanvas.width = img.width;
          sourceCanvas.height = img.height;
          sCtx.drawImage(img, 0, 0);

          const imageData = sCtx.getImageData(0, 0, img.width, img.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height);

          if (code) {
            const loc = code.location;
            const x = Math.min(loc.topLeftCorner.x, loc.topRightCorner.x, loc.bottomLeftCorner.x, loc.bottomRightCorner.x);
            const y = Math.min(loc.topLeftCorner.y, loc.topRightCorner.y, loc.bottomLeftCorner.y, loc.bottomRightCorner.y);
            const qrWidth = Math.max(loc.topRightCorner.x, loc.bottomRightCorner.x) - Math.min(loc.topLeftCorner.x, loc.bottomLeftCorner.x);
            const qrHeight = Math.max(loc.bottomLeftCorner.y, loc.bottomRightCorner.y) - Math.min(loc.topLeftCorner.y, loc.topRightCorner.y);

            const padding = 15;
            const destCanvas = document.createElement('canvas');
            const dCtx = destCanvas.getContext('2d');
            
            const MAX_SIZE = 400;
            let finalW = qrWidth + padding * 2;
            let finalH = qrHeight + padding * 2;
            
            if(finalW > MAX_SIZE) {
                const ratio = MAX_SIZE / finalW;
                finalW = MAX_SIZE;
                finalH = finalH * ratio;
            }

            destCanvas.width = finalW;
            destCanvas.height = finalH;

            dCtx.drawImage(
              img,
              x - padding, y - padding, qrWidth + padding * 2, qrHeight + padding * 2,
              0, 0, finalW, finalH
            );

            // Silent compression to WebP 0.6
            const compressedBase64 = destCanvas.toDataURL('image/webp', 0.6);

            set(ref(database, 'settings/qrpayment'), compressedBase64)
              .then(() => {
                loadCurrentQR();
              })
              .catch(err => console.error("Upload error:", err));
          } else {
            alert("No QR code detected. Please try a clearer photo.");
          }
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    // Dropdown and UI Controls
    document.getElementById('profileBtn').onclick = (e) => {
      e.stopPropagation();
      document.getElementById('dropdownMenu').classList.toggle('show');
    };

    document.getElementById('settingsBtn').onclick = () => {
      document.getElementById('dropdownMenu').classList.remove('show');
      document.getElementById('settingsModal').style.display = 'flex';
    };

    document.getElementById('logoutBtn').onclick = () => {
      document.getElementById('dropdownMenu').classList.remove('show');
      window.location.href = "index.html";
    };

    document.addEventListener('click', () => {
      document.getElementById('dropdownMenu').classList.remove('show');
    });

    document.querySelectorAll('.modal').forEach(modal => {
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
    });

    loadAllUsers();
    loadCurrentQR();
  </script>
</body>
</html>
