<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Reviewer | Academic Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f8f4fa;
      color: #2c1e3f;
      min-height: 100vh;
      padding: 20px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone-frame {
      max-width: 380px;
      width: 100%;
      background: white;
      border-radius: 48px;
      box-shadow: 0 25px 45px -12px rgba(78, 53, 111, 0.25);
      overflow: hidden;
      height: 100vh;
      min-height: 100dvh;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .status-bar {
      height: 44px;
      background: white;
      flex-shrink: 0;
    }

    .header {
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      flex-shrink: 0;
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: #2c1e3f;
    }

    .back-btn {
      font-size: 28px;
      cursor: pointer;
      color: #4E356F;
    }

    /* Controls */
    .reviewer-controls {
      padding: 16px 24px 12px;
      background: white;
      border-bottom: 1px solid #ecdde6;
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    .control-btn {
      padding: 8px 16px;
      border: 1.5px solid #ecdde6;
      background: white;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .control-btn.active {
      background: #4E356F;
      color: white;
      border-color: #4E356F;
    }

    .highlight-btn {
      background: #EF9875;
      color: white;
      border: none;
    }

    /* Notes Area */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      padding-bottom: 120px;
      -webkit-overflow-scrolling: touch;
    }

    .notes-area {
      width: 100%;
      min-height: 400px;
      border: 2px solid #ecdde6;
      border-radius: 20px;
      padding: 20px;
      font-size: 16px;
      line-height: 1.6;
      background: #fffdf7;
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.03);
      resize: none;
      font-family: 'Inter', serif;
    }

    .notes-area:focus {
      outline: none;
      border-color: #4E356F;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #e9dee4;
      box-shadow: 0 -10px 30px -10px rgba(78, 53, 111, 0.3);
      display: flex;
      justify-content: space-around;
      padding: 12px 0 22px;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #9C6A82;
      font-size: 11px;
      font-weight: 600;
      gap: 4px;
      cursor: pointer;
    }

    .nav-item.active {
      color: #4E356F;
    }

    .nav-icon {
      font-size: 24px;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    
    <!-- Status Bar -->
    <div class="status-bar"></div>

    <!-- Header -->
    <div class="header">
      <div class="back-btn" onclick="window.location.href='dashboard.html'">←</div>
      <div class="page-title">Reviewer</div>
      <div style="width:28px;"></div>
    </div>

    <!-- Controls: Text Size & Highlight -->
    <div class="reviewer-controls">
      <div class="control-btn active" id="sizeSmall" onclick="changeFontSize(14)">A-</div>
      <div class="control-btn" id="sizeMedium" onclick="changeFontSize(17)">A</div>
      <div class="control-btn" id="sizeLarge" onclick="changeFontSize(20)">A+</div>
      
      <button class="control-btn highlight-btn" onclick="highlightSelectedText()">
        Highlight
      </button>
    </div>

    <!-- Main Notes Area -->
    <div class="main-content">
      <textarea id="notesArea" class="notes-area" placeholder="Start writing your notes here...&#10;You can highlight important parts."></textarea>
    </div>

    <!-- Floating Bottom Navigation -->
    <div class="bottom-nav">
      <div class="nav-item" onclick="window.location.href='dashboard.html'">
        <div class="nav-icon">🏠</div>
        <div>Home</div>
      </div>
      <div class="nav-item" onclick="window.location.href='tracker.html'">
        <div class="nav-icon">📊</div>
        <div>Tracker</div>
      </div>
      <div class="nav-item active">
        <div class="nav-icon">📄</div>
        <div>Reviewer</div>
      </div>
      <div class="nav-item" onclick="alert('Profile section - Coming soon')">
        <div class="nav-icon">👤</div>
        <div>Profile</div>
      </div>
    </div>
  </div>

  <script>
    const notesArea = document.getElementById('notesArea');
    let currentSize = 17;

    // Change font size
    function changeFontSize(size) {
      currentSize = size;
      notesArea.style.fontSize = size + 'px';

      // Update active button
      document.querySelectorAll('.control-btn').forEach(btn => {
        btn.classList.remove('active');
        if ((size === 14 && btn.id === 'sizeSmall') ||
            (size === 17 && btn.id === 'sizeMedium') ||
            (size === 20 && btn.id === 'sizeLarge')) {
          btn.classList.add('active');
        }
      });
    }

    // Highlight selected text
    function highlightSelectedText() {
      const textarea = notesArea;
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;

      if (start === end) {
        alert("Please select some text to highlight.");
        return;
      }

      const text = textarea.value;
      const selectedText = text.substring(start, end);
      const highlighted = `<mark style="background-color: #FFEB3B; padding: 2px 4px; border-radius: 3px;">${selectedText}</mark>`;

      // For simplicity, we'll wrap with <mark> tag (works in contenteditable, but here we simulate)
      // Since textarea doesn't support HTML, we'll show alert for now and suggest using contenteditable later if needed

      alert("Highlight feature in textarea is limited.\n\nSelected text would be highlighted if we used a contenteditable div.\n\nFor now, you can manually add **important** notes.");
      
      // Optional: You can replace the text with bold or something
      // textarea.value = text.substring(0, start) + "**" + selectedText + "**" + text.substring(end);
    }

    // Auto-save notes to localStorage
    function saveNotes() {
      localStorage.setItem('reviewerNotes', notesArea.value);
    }

    // Load saved notes
    function loadNotes() {
      const saved = localStorage.getItem('reviewerNotes');
      if (saved) {
        notesArea.value = saved;
      }
    }

    // Event listeners
    notesArea.addEventListener('input', saveNotes);

    // Initialize
    window.onload = () => {
      loadNotes();
      changeFontSize(17); // Default medium size
    };
  </script>
</body>
</html>
