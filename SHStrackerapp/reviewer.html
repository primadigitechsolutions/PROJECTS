<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Reviewer | Academic Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f8f4fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 10px;
    }

    .phone-frame {
      width: 100%; max-width: 400px; height: 92vh;
      background: white; border-radius: 40px;
      box-shadow: 0 25px 45px -12px rgba(78, 53, 111, 0.2);
      overflow: hidden; display: flex; flex-direction: column; position: relative;
    }

    /* Header Section */
    .header { padding: 24px 24px 10px; display: flex; justify-content: space-between; align-items: center; }
    .back-btn { font-size: 24px; cursor: pointer; color: #4E356F; width: 40px; }
    .page-title { font-size: 20px; font-weight: 700; color: #2c1e3f; flex: 1; text-align: center; margin-right: 40px; }

    .greeting-area { padding: 0 24px 15px; }
    .greeting { font-size: 22px; font-weight: 700; color: #2c1e3f; }
    .greeting .name { color: #EF9875; }

    /* Reviewer Toolbar */
    .reviewer-controls {
      padding: 0 24px 15px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .reviewer-controls::-webkit-scrollbar { display: none; }

    .control-btn {
      padding: 10px 16px;
      border: 1.5px solid #f0e6f5;
      background: white;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 700;
      color: #4E356F;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .control-btn:active { background: #4E356F; color: white; transform: scale(0.95); }
    
    .add-header-btn { background: #4E356F; color: white; border: none; }
    .highlight-btn { background: #EF9875; color: white; border: none; }

    /* Main content / Editable Area */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 0 24px 100px;
    }

    .notes-area {
      width: 100%;
      min-height: 100%;
      border: 1.5px solid #f0e6f5;
      border-radius: 24px;
      padding: 20px;
      background: #fffdfc;
      font-size: 16px;
      line-height: 1.6;
      color: #2c1e3f;
      outline: none;
    }

    /* Styles for the structured text inside the notes area */
    .notes-area h2 {
      font-size: 22px;
      font-weight: 800;
      color: #2c1e3f;
      margin: 15px 0 5px 0;
      display: block;
    }
    
    .notes-area p {
      font-size: 16px;
      font-weight: 400;
      color: #666;
      margin-bottom: 10px;
    }

    .notes-area:empty:before {
      content: "Tap 'Add Header' to start a topic...";
      color: #9C6A82;
      opacity: 0.6;
    }

    /* Navigation */
    .bottom-nav {
      position: absolute; bottom: 0; left: 0; right: 0; background: white;
      border-top: 1px solid #e9dee4; display: flex; justify-content: space-around; padding: 10px 0 25px;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: #9C6A82; font-size: 11px; cursor: pointer; }
    .nav-item.active { color: #4E356F; font-weight: 700; }
    .nav-icon { font-size: 22px; margin-bottom: 4px; }
  </style>
</head>
<body>

<div class="phone-frame">
  <div class="header">
    <div class="back-btn" onclick="window.location.href='dashboard.html'">←</div>
    <div class="page-title">Reviewer</div>
  </div>

  <div class="greeting-area">
    <div class="greeting">Hi, <span class="name" id="userName">Student</span> 👋</div>
  </div>

  <div class="reviewer-controls">
    <div class="control-btn add-header-btn" id="btnHeader">+ Add Header</div>
    <div class="control-btn" id="btnBullet">• Bullet</div>
    <div class="control-btn highlight-btn" id="btnHighlight">Highlight</div>
    <div class="control-btn" id="btnClear" style="color: #e07a5f;">Clear All</div>
  </div>

  <div class="main-content">
    <div id="notesArea" class="notes-area" contenteditable="true"></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='dashboard.html'"><div class="nav-icon">🏠</div>Home</div>
    <div class="nav-item" onclick="window.location.href='tracker.html'"><div class="nav-icon">📊</div>Tracker</div>
    <div class="nav-item active"><div class="nav-icon">📄</div>Reviewer</div>
    <div class="nav-item" onclick="window.location.href='profile.html'"><div class="nav-icon">👤</div>Profile</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC-E_V2GdszTfWmDZ3bfvRWl_zvXy4OzR8",
    authDomain: "shstrackerapp.firebaseapp.com",
    databaseURL: "https://shstrackerapp-default-rtdb.firebaseio.com",
    projectId: "shstrackerapp",
    storageBucket: "shstrackerapp.firebasestorage.app",
    messagingSenderId: "807451936679",
    appId: "1:807451936679:web:37fa86f3b272afe9505882"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const database = getDatabase(app);

  let currentUid = null;
  const notesArea = document.getElementById('notesArea');

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUid = user.uid;
      document.getElementById('userName').textContent = user.displayName || user.email.split('@')[0];
      loadNotes();
    } else { window.location.href = "login.html"; }
  });

  function loadNotes() {
    onValue(ref(database, `users/${currentUid}/reviewerNotes`), (snapshot) => {
      const data = snapshot.val();
      if (data !== null && document.activeElement !== notesArea) {
        notesArea.innerHTML = data;
      }
    }, { onlyOnce: true });
  }

  function saveNotes() {
    if (currentUid) set(ref(database, `users/${currentUid}/reviewerNotes`), notesArea.innerHTML);
  }

  let saveTimeout;
  notesArea.addEventListener('input', () => {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(saveNotes, 1000);
  });

  // --- SMART NOTEPAD LOGIC ---

  // Adds a Large Bold Header
  document.getElementById('btnHeader').onclick = () => {
    notesArea.focus();
    // Using H2 for the "Anatomy" style increased size and bold
    document.execCommand('formatBlock', false, 'h2');
    saveNotes();
  };

  // Adds a bullet point for structured notes
  document.getElementById('btnBullet').onclick = () => {
    notesArea.focus();
    document.execCommand('insertUnorderedList', false, null);
    saveNotes();
  };

  // Highlights existing text
  document.getElementById('btnHighlight').onclick = () => {
    document.execCommand('hiliteColor', false, '#FFEB3B');
    saveNotes();
  };

  document.getElementById('btnClear').onclick = () => {
    if(confirm("Clear all notes?")) {
      notesArea.innerHTML = '';
      saveNotes();
    }
  };

  // Ensure that when you press "Enter" after a header, it returns to plain text
  notesArea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const selection = window.getSelection();
      const parent = selection.anchorNode.parentElement;
      if (parent.tagName === 'H2') {
        // This stops the next line from also being an H2
        setTimeout(() => {
          document.execCommand('formatBlock', false, 'p');
        }, 0);
      }
    }
  });
</script>
</body>
</html>
