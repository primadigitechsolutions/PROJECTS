<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Reviewer | Academic Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f8f4fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 10px;
    }
    .phone-frame {
      width: 100%; max-width: 400px; height: 92vh;
      background: white; border-radius: 40px;
      box-shadow: 0 25px 45px -12px rgba(78, 53, 111, 0.2);
      overflow: hidden; display: flex; flex-direction: column; position: relative;
    }
    /* Professional Modals */
    .modal-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(44, 30, 63, 0.4); backdrop-filter: blur(5px);
      display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal {
      width: 85%; background: white; border-radius: 24px; padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 18px; color: #2c1e3f; margin-bottom: 12px; font-weight: 800; }
    .modal p { font-size: 14px; color: #9C6A82; margin-bottom: 20px; line-height: 1.4; }
   
    .modal input {
      width: 100%; padding: 14px; border: 1.5px solid #f0e6f5; border-radius: 12px;
      outline: none; font-size: 16px; margin-bottom: 20px; font-family: inherit;
    }
    .modal-actions { display: flex; gap: 10px; }
    .modal-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-size: 14px; }
   
    .btn-cancel { background: #f8f4fa; color: #9C6A82; }
    .btn-confirm { background: #4E356F; color: white; }
    .btn-danger { background: #e07a5f; color: white; }

    /* Header & Subject Navigator */
    .header { padding: 20px 24px 5px; display: flex; justify-content: space-between; align-items: center; }
    .back-btn { font-size: 24px; cursor: pointer; color: #4E356F; width: 40px; }
    .add-page-btn { font-size: 22px; color: #4E356F; cursor: pointer; background: #f0e6f5; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 12px; transition: 0.2s; }
    .add-page-btn:active { transform: scale(0.9); }

    .page-navigator {
      padding: 10px 24px;
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scrollbar-width: none;
      background: #fff;
    }
    .page-navigator::-webkit-scrollbar { display: none; }
    .page-tab {
      padding: 8px 18px;
      background: #f8f4fa;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: #9C6A82;
      white-space: nowrap;
      cursor: pointer;
      transition: 0.3s;
    }
    .page-tab.active {
      background: #4E356F;
      color: white;
      box-shadow: 0 4px 12px rgba(78, 53, 111, 0.15);
    }

    /* Formatting Toolbar */
    .reviewer-controls {
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border-top: 1px solid #f0e6f5;
      border-bottom: 1px solid #f0e6f5;
      flex-wrap: wrap;
    }
    .control-btn {
      width: 42px; height: 42px; border: 1px solid #eee; background: white;
      border-radius: 10px; font-size: 18px; display: flex; align-items: center;
      justify-content: center; cursor: pointer; color: #4E356F; transition: 0.2s;
    }
    .control-btn:active { background: #f0e6f5; transform: translateY(1px); }
    .export-btn {
      padding: 10px 16px;
      background: #4E356F;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .export-btn:active { transform: scale(0.95); }

    .divider { width: 1px; height: 24px; background: #eee; margin: 0 4px; }

    /* Writing Area */
    .main-content { flex: 1; overflow-y: auto; padding: 20px 24px 120px; }
    .notes-area { width: 100%; min-height: 100%; color: #2c1e3f; outline: none; font-size: 16px; line-height: 1.6; }
    .notes-area h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; color: #2c1e3f; }
    .notes-area p { color: #555; }
    .notes-area ul { padding-left: 22px; margin: 8px 0; }
    .notes-area li { color: #555; }

    /* Bottom Navigation */
    .bottom-nav {
      position: absolute; bottom: 0; left: 0; right: 0; background: white;
      border-top: 1px solid #e9dee4; display: flex; justify-content: space-around; padding: 10px 0 25px;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: #9C6A82; font-size: 11px; cursor: pointer; }
    .nav-item.active { color: #4E356F; font-weight: 700; }
    .nav-icon { font-size: 22px; margin-bottom: 4px; }
  </style>
</head>
<body>
<div class="phone-frame">
  <!-- Modals remain unchanged -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h3>New Subject</h3>
      <input type="text" id="subjectInput" placeholder="Subject Name (e.g. Anatomy)">
      <div class="modal-actions">
        <button class="modal-btn btn-cancel" onclick="closeModals()">Cancel</button>
        <button class="modal-btn btn-confirm" id="confirmAdd">Save</button>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h3>Delete Subject?</h3>
      <p id="deleteMsg">Are you sure you want to delete this subject and all its notes?</p>
      <div class="modal-actions">
        <button class="modal-btn btn-cancel" onclick="closeModals()">Cancel</button>
        <button class="modal-btn btn-danger" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <div class="header">
    <div class="back-btn" onclick="window.location.href='dashboard.html'">←</div>
    <div class="add-page-btn" onclick="openAddModal()">＋</div>
  </div>

  <div class="page-navigator" id="pageTabs"></div>

  <div class="reviewer-controls">
    <button class="control-btn" id="btnH1" title="Heading"><b>H</b></button>
    <button class="control-btn" id="btnBody" title="Normal Text">¶</button>
    <button class="control-btn" id="btnBullet" title="Bullet List">≡</button>
    <button class="control-btn" id="btnHighlight" title="Highlight">🖍️</button>
    <div class="divider"></div>
    <button class="control-btn" onclick="openDeleteModal()" style="color: #e07a5f;" title="Delete Subject">🗑️</button>
    
    <!-- New Export Button -->
    <button class="export-btn" onclick="exportToPDF()">
      📄 Export PDF
    </button>
  </div>

  <div class="main-content">
    <div id="notesArea" class="notes-area" contenteditable="true" spellcheck="false"></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='dashboard.html'"><div class="nav-icon">🏠</div>Home</div>
    <div class="nav-item" onclick="window.location.href='tracker.html'"><div class="nav-icon">📊</div>Tracker</div>
    <div class="nav-item active"><div class="nav-icon">📄</div>Reviewer</div>
    <div class="nav-item" onclick="window.location.href='profile.html'"><div class="nav-icon">👤</div>Profile</div>
  </div>
</div>

<!-- html2pdf.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC-E_V2GdszTfWmDZ3bfvRWl_zvXy4OzR8",
    authDomain: "shstrackerapp.firebaseapp.com",
    databaseURL: "https://shstrackerapp-default-rtdb.firebaseio.com",
    projectId: "shstrackerapp",
    storageBucket: "shstrackerapp.firebasestorage.app",
    messagingSenderId: "807451936679",
    appId: "1:807451936679:web:37fa86f3b272afe9505882"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const database = getDatabase(app);

  let currentUid = null, currentPageId = "General";
  const notesArea = document.getElementById('notesArea');
  const tabsContainer = document.getElementById('pageTabs');

  onAuthStateChanged(auth, user => {
    if (user) { 
      currentUid = user.uid; 
      loadPageList(); 
    }
    else { window.location.href = "login.html"; }
  });

  // --- MODAL CONTROLS ---
  window.openAddModal = () => {
    document.getElementById('addModal').style.display = 'flex';
    document.getElementById('subjectInput').focus();
  };
 
  window.openDeleteModal = () => {
    if(currentPageId === "General") return alert("The General page is permanent.");
    document.getElementById('deleteMsg').innerText = `Permanently delete "${currentPageId}" and its notes?`;
    document.getElementById('deleteModal').style.display = 'flex';
  };

  window.closeModals = () => {
    document.getElementById('addModal').style.display = 'none';
    document.getElementById('deleteModal').style.display = 'none';
  };

  // --- DATA OPERATIONS ---
  function loadPageList() {
    onValue(ref(database, `users/${currentUid}/notesPages`), snapshot => {
      const pages = snapshot.val() || { "General": { title: "General" } };
      renderTabs(pages);
      switchPage(currentPageId);
    });
  }

  function renderTabs(pages) {
    tabsContainer.innerHTML = "";
    Object.keys(pages).forEach(id => {
      const tab = document.createElement('div');
      tab.className = `page-tab ${id === currentPageId ? 'active' : ''}`;
      tab.textContent = pages[id].title;
      tab.onclick = () => switchPage(id);
      tabsContainer.appendChild(tab);
    });
  }

  function switchPage(id) {
    currentPageId = id;
    onValue(ref(database, `users/${currentUid}/reviewerNotes/${id}`), snap => {
      if (document.activeElement !== notesArea) notesArea.innerHTML = snap.val() || "";
    }, { onlyOnce: true });
   
    document.querySelectorAll('.page-tab').forEach(t => {
      t.classList.toggle('active', t.textContent === id);
    });
  }

  document.getElementById('confirmAdd').onclick = () => {
    const title = document.getElementById('subjectInput').value.trim();
    if (title) {
      set(ref(database, `users/${currentUid}/notesPages/${title}`), { title: title });
      currentPageId = title;
      closeModals();
      document.getElementById('subjectInput').value = "";
    }
  };

  document.getElementById('confirmDelete').onclick = () => {
    remove(ref(database, `users/${currentUid}/notesPages/${currentPageId}`));
    remove(ref(database, `users/${currentUid}/reviewerNotes/${currentPageId}`));
    currentPageId = "General";
    closeModals();
  };

  // --- AUTO-SAVE ---
  function saveNotes() {
    if (currentUid) set(ref(database, `users/${currentUid}/reviewerNotes/${currentPageId}`), notesArea.innerHTML);
  }
 
  let saveTimeout;
  notesArea.addEventListener('input', () => {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(saveNotes, 800);
  });

  // --- EDITOR TOOLS ---
  document.getElementById('btnH1').onclick = () => { notesArea.focus(); document.execCommand('formatBlock', false, 'h1'); saveNotes(); };
  document.getElementById('btnBody').onclick = () => { notesArea.focus(); document.execCommand('formatBlock', false, 'p'); saveNotes(); };
  document.getElementById('btnBullet').onclick = () => { notesArea.focus(); document.execCommand('insertUnorderedList'); saveNotes(); };
  document.getElementById('btnHighlight').onclick = () => { document.execCommand('hiliteColor', false, '#FFEB3B'); saveNotes(); };

  notesArea.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const parent = window.getSelection().anchorNode?.parentElement;
      if (parent && parent.tagName === 'H1') {
        setTimeout(() => document.execCommand('formatBlock', false, 'p'), 10);
      }
    }
  });

  // ====================== NEW: EXPORT TO PDF ======================
  window.exportToPDF = async () => {
    if (!notesArea.innerHTML.trim()) {
      alert("Nothing to export! Write some notes first.");
      return;
    }

    const pageTitle = currentPageId || "Notes";

    // Create a clean clone for PDF (removes mobile styling)
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = `
      <div style="font-family: Inter, system-ui, sans-serif; padding: 40px 30px; max-width: 800px; margin: 0 auto; color: #2c1e3f; line-height: 1.7;">
        <h1 style="font-size: 28px; margin-bottom: 30px; color: #4E356F; text-align: center;">
          ${pageTitle}
        </h1>
        <div style="font-size: 16px;">
          ${notesArea.innerHTML}
        </div>
      </div>
    `;

    const options = {
      margin: [15, 15, 15, 15],
      filename: `${pageTitle.replace(/[^a-zA-Z0-9]/g, '_')}_Notes.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { 
        scale: 2,
        useCORS: true,
        letterRendering: true
      },
      jsPDF: { 
        unit: 'mm', 
        format: 'a4', 
        orientation: 'portrait' 
      }
    };

    try {
      await html2pdf().set(options).from(tempDiv).save();
    } catch (err) {
      console.error(err);
      alert("Failed to generate PDF. Please try again.");
    }
  };
</script>
</body>
</html>
