<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Reviewer | Academic Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f8f4fa;
      color: #2c1e3f;
      min-height: 100vh;
      padding: 20px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .phone-frame {
      max-width: 380px;
      width: 100%;
      background: white;
      border-radius: 48px;
      box-shadow: 0 25px 45px -12px rgba(78, 53, 111, 0.25);
      overflow: hidden;
      height: 100vh;
      min-height: 100dvh;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      height: 44px;
      background: white;
      flex-shrink: 0;
    }
    .header {
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      flex-shrink: 0;
    }
    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: #2c1e3f;
    }
    .back-btn {
      font-size: 28px;
      cursor: pointer;
      color: #4E356F;
    }
    .greeting {
      font-size: 20px;
      font-weight: 600;
      color: #4E356F;
      margin: 12px 24px 8px;
    }
    .reviewer-controls {
      padding: 16px 24px 12px;
      background: white;
      border-bottom: 1px solid #ecdde6;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      flex-shrink: 0;
    }
    .control-btn {
      padding: 8px 14px;
      border: 1.5px solid #ecdde6;
      background: white;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .control-btn.active {
      background: #4E356F;
      color: white;
      border-color: #4E356F;
    }
    .highlight-btn {
      background: #EF9875;
      color: white;
      border: none;
    }
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      padding-bottom: 120px;
      -webkit-overflow-scrolling: touch;
    }
    .notes-area {
      width: 100%;
      min-height: 420px;
      border: 2px solid #ecdde6;
      border-radius: 20px;
      padding: 20px;
      background: #fffdf7;
      box-shadow: inset 0 4px 12px rgba(0,0,0,0.03);
      font-family: 'Inter', serif;
      line-height: 1.7;
      font-size: 17px;
      outline: none;
      overflow-y: auto;
    }
    .notes-area mark {
      background-color: #FFEB3B;
      padding: 2px 4px;
      border-radius: 3px;
    }
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #e9dee4;
      box-shadow: 0 -10px 30px -10px rgba(78, 53, 111, 0.3);
      display: flex;
      justify-content: space-around;
      padding: 12px 0 22px;
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #9C6A82;
      font-size: 11px;
      font-weight: 600;
      gap: 4px;
      cursor: pointer;
    }
    .nav-item.active {
      color: #4E356F;
    }
    .nav-icon {
      font-size: 24px;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
   
    <div class="status-bar"></div>

    <div class="header">
      <div class="back-btn" onclick="window.location.href='dashboard.html'">←</div>
      <div class="page-title">Reviewer</div>
      <div style="width:28px;"></div>
    </div>

    <!-- Dynamic Greeting -->
    <div class="greeting">Hi, <span id="userName">Student</span> 👋</div>

    <!-- Controls -->
    <div class="reviewer-controls">
      <div class="control-btn" onclick="formatText('small')">A-</div>
      <div class="control-btn" onclick="formatText('medium')">A</div>
      <div class="control-btn" onclick="formatText('large')">A+</div>
      <button class="control-btn highlight-btn" onclick="highlightSelectedText()">Highlight</button>
    </div>

    <!-- Notes Area -->
    <div class="main-content">
      <div id="notesArea" class="notes-area" contenteditable="true"
           placeholder="Start writing your notes here... Select any text and customize it individually.">
      </div>
    </div>

    <!-- Floating Bottom Navigation -->
    <div class="bottom-nav">
      <div class="nav-item" onclick="window.location.href='dashboard.html'">
        <div class="nav-icon">🏠</div>
        <div>Home</div>
      </div>
      <div class="nav-item" onclick="window.location.href='tracker.html'">
        <div class="nav-icon">📊</div>
        <div>Tracker</div>
      </div>
      <div class="nav-item active">
        <div class="nav-icon">📄</div>
        <div>Reviewer</div>
      </div>
      <div class="nav-item" onclick="window.location.href='profile.html'">
        <div class="nav-icon">👤</div>
        <div>Profile</div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { 
      getAuth, 
      onAuthStateChanged, 
      signOut 
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC-E_V2GdszTfWmDZ3bfvRWl_zvXy4OzR8",
      authDomain: "shstrackerapp.firebaseapp.com",
      databaseURL: "https://shstrackerapp-default-rtdb.firebaseio.com",
      projectId: "shstrackerapp",
      storageBucket: "shstrackerapp.firebasestorage.app",
      messagingSenderId: "807451936679",
      appId: "1:807451936679:web:37fa86f3b272afe9505882",
      measurementId: "G-Y8WM86KTCG"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    let currentUserId = null;

    // ====================== Account Sync ======================
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUserId = user.uid;
        const displayName = user.displayName || user.email?.split('@')[0] || "Student";
        document.getElementById('userName').textContent = displayName;

        console.log("✅ Reviewer loaded for user:", user.email);

        // Load saved notes from Firebase for this user
        loadNotesFromFirebase();

      } else {
        console.log("❌ No user found, redirecting to login");
        window.location.href = "login.html";
      }
    });

    // ====================== Firebase Notes Save/Load ======================
    function saveNotesToFirebase() {
      if (!currentUserId) return;
      const notesRef = ref(database, 'users/' + currentUserId + '/reviewerNotes');
      set(notesRef, document.getElementById('notesArea').innerHTML);
    }

    function loadNotesFromFirebase() {
      if (!currentUserId) return;
      const notesRef = ref(database, 'users/' + currentUserId + '/reviewerNotes');
      
      onValue(notesRef, (snapshot) => {
        const savedNotes = snapshot.val();
        const notesArea = document.getElementById('notesArea');
        
        if (savedNotes) {
          notesArea.innerHTML = savedNotes;
        } else {
          notesArea.innerHTML = '<p style="color:#999;">Start writing your notes here...<br>Select any text and use the buttons above to customize font size or highlight.</p>';
        }
      });
    }

    // ====================== Text Formatting ======================
    const notesArea = document.getElementById('notesArea');

    function formatText(size) {
      const selection = window.getSelection();
      if (selection.rangeCount === 0 || selection.toString().trim() === '') {
        alert("Please select some text first.");
        return;
      }
      const range = selection.getRangeAt(0);
      const selectedText = range.toString();
      if (!selectedText) return;

      let fontSize = size === 'small' ? '14px' : size === 'medium' ? '17px' : '21px';

      const span = document.createElement('span');
      span.style.fontSize = fontSize;
      span.textContent = selectedText;

      range.deleteContents();
      range.insertNode(span);
      saveNotesToFirebase();
    }

    function highlightSelectedText() {
      const selection = window.getSelection();
      if (selection.rangeCount === 0 || selection.toString().trim() === '') {
        alert("Please select some text to highlight.");
        return;
      }
      const range = selection.getRangeAt(0);
      const mark = document.createElement('mark');
      mark.textContent = range.toString();
      range.deleteContents();
      range.insertNode(mark);
      saveNotesToFirebase();
    }

    // Auto-save on input with debounce
    let timeout;
    notesArea.addEventListener('input', () => {
      clearTimeout(timeout);
      timeout = setTimeout(saveNotesToFirebase, 800);
    });

    // ====================== Logout ======================
    function logout() {
      if (confirm("Are you sure you want to logout?")) {
        signOut(auth).then(() => {
          window.location.href = "login.html";
        }).catch((error) => {
          console.error("Logout error:", error);
          alert("Failed to logout.");
        });
      }
    }

    // Initialize
    window.onload = () => {
      // Notes will be loaded automatically via onValue listener
    };
  </script>
</body>
</html>
