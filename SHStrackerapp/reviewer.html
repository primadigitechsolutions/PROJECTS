<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Reviewer | Academic Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f8f4fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 10px;
    }

    .phone-frame {
      width: 100%; max-width: 400px; height: 92vh;
      background: white; border-radius: 40px;
      box-shadow: 0 25px 45px -12px rgba(78, 53, 111, 0.2);
      overflow: hidden; display: flex; flex-direction: column; position: relative;
    }

    /* Professional Header & Page Navigator */
    .header { padding: 20px 24px 5px; display: flex; justify-content: space-between; align-items: center; }
    .back-btn { font-size: 24px; cursor: pointer; color: #4E356F; }
    .add-page-btn { font-size: 20px; font-weight: 700; color: #4E356F; cursor: pointer; background: #f0e6f5; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

    .page-navigator {
      padding: 10px 24px;
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scrollbar-width: none;
      background: #fff;
    }
    .page-navigator::-webkit-scrollbar { display: none; }

    .page-tab {
      padding: 6px 16px;
      background: #f8f4fa;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: #9C6A82;
      white-space: nowrap;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.3s;
    }
    .page-tab.active {
      background: #4E356F;
      color: white;
      box-shadow: 0 4px 10px rgba(78, 53, 111, 0.2);
    }

    /* Toolbar */
    .reviewer-controls {
      padding: 10px 24px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      border-bottom: 1px solid #f0e6f5;
    }
    .reviewer-controls::-webkit-scrollbar { display: none; }

    .control-btn {
      padding: 8px 14px;
      border: 1.5px solid #f0e6f5;
      background: white;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      color: #4E356F;
      cursor: pointer;
    }
    .btn-primary { background: #4E356F; color: white; border: none; }
    .btn-accent { background: #EF9875; color: white; border: none; }

    /* Writing Area */
    .main-content { flex: 1; overflow-y: auto; padding: 20px 24px 100px; }
    .notes-area { width: 100%; min-height: 100%; color: #2c1e3f; outline: none; font-size: 16px; line-height: 1.5; }

    /* Styling */
    .notes-area h1 { font-size: 24px; font-weight: 800; margin: 10px 0 2px; color: #2c1e3f; }
    .notes-area p { font-size: 16px; color: #555; margin-bottom: 4px; }
    .notes-area ul { padding-left: 20px; }

    /* Bottom Nav */
    .bottom-nav {
      position: absolute; bottom: 0; left: 0; right: 0; background: white;
      border-top: 1px solid #e9dee4; display: flex; justify-content: space-around; padding: 10px 0 25px;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: #9C6A82; font-size: 11px; cursor: pointer; }
    .nav-item.active { color: #4E356F; font-weight: 700; }
    .nav-icon { font-size: 22px; margin-bottom: 4px; }
  </style>
</head>
<body>

<div class="phone-frame">
  <div class="header">
    <div class="back-btn" onclick="window.location.href='dashboard.html'">←</div>
    <div id="addPage" class="add-page-btn">+</div>
  </div>

  <div class="page-navigator" id="pageTabs">
    </div>

  <div class="reviewer-controls">
    <button class="control-btn btn-primary" id="btnH1">Title</button>
    <button class="control-btn" id="btnBody">Body</button>
    <button class="control-btn" id="btnBullet">• Bullet</button>
    <button class="control-btn btn-accent" id="btnHighlight">Highlight</button>
    <button class="control-btn" id="btnDeletePage" style="color:#e07a5f">Del</button>
  </div>

  <div class="main-content">
    <div id="notesArea" class="notes-area" contenteditable="true"></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='dashboard.html'"><div class="nav-icon">🏠</div>Home</div>
    <div class="nav-item" onclick="window.location.href='tracker.html'"><div class="nav-icon">📊</div>Tracker</div>
    <div class="nav-item active"><div class="nav-icon">📄</div>Reviewer</div>
    <div class="nav-item" onclick="window.location.href='profile.html'"><div class="nav-icon">👤</div>Profile</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
  import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC-E_V2GdszTfWmDZ3bfvRWl_zvXy4OzR8",
    authDomain: "shstrackerapp.firebaseapp.com",
    databaseURL: "https://shstrackerapp-default-rtdb.firebaseio.com",
    projectId: "shstrackerapp",
    storageBucket: "shstrackerapp.firebasestorage.app",
    messagingSenderId: "807451936679",
    appId: "1:807451936679:web:37fa86f3b272afe9505882"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const database = getDatabase(app);

  let currentUid = null;
  let currentPageId = "Default";
  const notesArea = document.getElementById('notesArea');
  const tabsContainer = document.getElementById('pageTabs');

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUid = user.uid;
      loadPageList();
    } else { window.location.href = "login.html"; }
  });

  // --- PAGE MANAGEMENT ---

  function loadPageList() {
    const listRef = ref(database, `users/${currentUid}/notesPages`);
    onValue(listRef, (snapshot) => {
      const pages = snapshot.val() || { "Default": { title: "General" } };
      renderTabs(pages);
      switchPage(currentPageId);
    });
  }

  function renderTabs(pages) {
    tabsContainer.innerHTML = "";
    Object.keys(pages).forEach(id => {
      const tab = document.createElement('div');
      tab.className = `page-tab ${id === currentPageId ? 'active' : ''}`;
      tab.textContent = pages[id].title;
      tab.onclick = () => switchPage(id);
      tabsContainer.appendChild(tab);
    });
  }

  function switchPage(id) {
    currentPageId = id;
    const allTabs = document.querySelectorAll('.page-tab');
    allTabs.forEach(t => t.classList.remove('active'));
    // Visual update
    const activeTab = Array.from(allTabs).find(t => t.textContent === id) || allTabs[0];
    if(activeTab) activeTab.classList.add('active');

    // Load content for this specific page
    const contentRef = ref(database, `users/${currentUid}/reviewerNotes/${currentPageId}`);
    onValue(contentRef, (snapshot) => {
      const data = snapshot.val();
      if (document.activeElement !== notesArea) {
        notesArea.innerHTML = data || "";
      }
    }, { onlyOnce: true });
  }

  document.getElementById('addPage').onclick = () => {
    const title = prompt("Enter Note Subject (e.g. Anatomy):");
    if (title) {
      const newId = title.replace(/\s+/g, '_');
      set(ref(database, `users/${currentUid}/notesPages/${newId}`), { title: title });
      currentPageId = newId;
    }
  };

  document.getElementById('btnDeletePage').onclick = () => {
    if(currentPageId === "Default") return alert("Cannot delete main page");
    if(confirm(`Delete ${currentPageId}?`)) {
      remove(ref(database, `users/${currentUid}/notesPages/${currentPageId}`));
      remove(ref(database, `users/${currentUid}/reviewerNotes/${currentPageId}`));
      currentPageId = "Default";
    }
  };

  // --- SAVE LOGIC ---
  function saveNotes() {
    if (currentUid) {
      set(ref(database, `users/${currentUid}/reviewerNotes/${currentPageId}`), notesArea.innerHTML);
    }
  }

  let saveTimeout;
  notesArea.addEventListener('input', () => {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(saveNotes, 1000);
  });

  // --- TOOLBAR COMMANDS ---
  document.getElementById('btnBullet').onclick = () => { notesArea.focus(); document.execCommand('insertUnorderedList'); saveNotes(); };
  document.getElementById('btnH1').onclick = () => { notesArea.focus(); document.execCommand('formatBlock', false, 'h1'); saveNotes(); };
  document.getElementById('btnBody').onclick = () => { notesArea.focus(); document.execCommand('formatBlock', false, 'p'); saveNotes(); };
  document.getElementById('btnHighlight').onclick = () => { document.execCommand('hiliteColor', false, '#FFEB3B'); saveNotes(); };

  notesArea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const selection = window.getSelection();
      const parent = selection.anchorNode.parentElement;
      if (parent.tagName === 'H1') setTimeout(() => document.execCommand('formatBlock', false, 'p'), 10);
    }
  });
</script>
</body>
</html>
