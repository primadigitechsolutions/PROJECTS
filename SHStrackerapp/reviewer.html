<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Reviewer | Academic Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f8f4fa;
      color: #2c1e3f;
      min-height: 100vh;
      padding: 20px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone-frame {
      max-width: 380px;
      width: 100%;
      background: white;
      border-radius: 48px;
      box-shadow: 0 25px 45px -12px rgba(78, 53, 111, 0.25);
      overflow: hidden;
      height: 100vh;
      min-height: 100dvh;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .status-bar {
      height: 44px;
      background: white;
      flex-shrink: 0;
    }

    .header {
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      flex-shrink: 0;
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: #2c1e3f;
    }

    .back-btn {
      font-size: 28px;
      cursor: pointer;
      color: #4E356F;
    }

    .reviewer-controls {
      padding: 16px 24px 12px;
      background: white;
      border-bottom: 1px solid #ecdde6;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      flex-shrink: 0;
    }

    .control-btn {
      padding: 8px 14px;
      border: 1.5px solid #ecdde6;
      background: white;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .control-btn.active {
      background: #4E356F;
      color: white;
      border-color: #4E356F;
    }

    .highlight-btn {
      background: #EF9875;
      color: white;
      border: none;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      padding-bottom: 120px;
      -webkit-overflow-scrolling: touch;
    }

    .notes-area {
      width: 100%;
      min-height: 420px;
      border: 2px solid #ecdde6;
      border-radius: 20px;
      padding: 20px;
      background: #fffdf7;
      box-shadow: inset 0 4px 12px rgba(0,0,0,0.03);
      font-family: 'Inter', serif;
      line-height: 1.7;
      font-size: 17px;
      outline: none;
      overflow-y: auto;
    }

    .notes-area mark {
      background-color: #FFEB3B;
      padding: 2px 4px;
      border-radius: 3px;
    }

    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #e9dee4;
      box-shadow: 0 -10px 30px -10px rgba(78, 53, 111, 0.3);
      display: flex;
      justify-content: space-around;
      padding: 12px 0 22px;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #9C6A82;
      font-size: 11px;
      font-weight: 600;
      gap: 4px;
      cursor: pointer;
    }

    .nav-item.active {
      color: #4E356F;
    }

    .nav-icon {
      font-size: 24px;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    
    <div class="status-bar"></div>

    <div class="header">
      <div class="back-btn" onclick="window.location.href='dashboard.html'">←</div>
      <div class="page-title">Reviewer</div>
      <div style="width:28px;"></div>
    </div>

    <!-- Controls -->
    <div class="reviewer-controls">
      <div class="control-btn" onclick="formatText('small')">A-</div>
      <div class="control-btn" onclick="formatText('medium')">A</div>
      <div class="control-btn" onclick="formatText('large')">A+</div>
      <button class="control-btn highlight-btn" onclick="highlightSelectedText()">Highlight</button>
    </div>

    <!-- Notes Area -->
    <div class="main-content">
      <div id="notesArea" class="notes-area" contenteditable="true" 
           placeholder="Start writing your notes here... Select any text and customize it individually.">
      </div>
    </div>

    <!-- Floating Bottom Navigation -->
    <div class="bottom-nav">
      <div class="nav-item" onclick="window.location.href='dashboard.html'">
        <div class="nav-icon">🏠</div>
        <div>Home</div>
      </div>
      <div class="nav-item" onclick="window.location.href='tracker.html'">
        <div class="nav-icon">📊</div>
        <div>Tracker</div>
      </div>
      <div class="nav-item active">
        <div class="nav-icon">📄</div>
        <div>Reviewer</div>
      </div>
      <div class="nav-item" onclick="alert('Profile section - Coming soon')">
        <div class="nav-icon">👤</div>
        <div>Profile</div>
      </div>
    </div>
  </div>

  <script>
    const notesArea = document.getElementById('notesArea');

    // Format selected text (individual letters/words)
    function formatText(size) {
      const selection = window.getSelection();
      
      if (selection.rangeCount === 0 || selection.toString().trim() === '') {
        alert("Please select some text first to change its size.");
        return;
      }

      const range = selection.getRangeAt(0);
      const selectedText = range.toString();

      if (!selectedText) return;

      let fontSize;
      if (size === 'small') fontSize = '14px';
      else if (size === 'medium') fontSize = '17px';
      else if (size === 'large') fontSize = '21px';

      // Create a span with the desired font size
      const span = document.createElement('span');
      span.style.fontSize = fontSize;
      span.textContent = selectedText;

      // Replace selected text with the styled span
      range.deleteContents();
      range.insertNode(span);

      // Save notes
      saveNotes();
    }

    // Highlight selected text
    function highlightSelectedText() {
      const selection = window.getSelection();
      
      if (selection.rangeCount === 0 || selection.toString().trim() === '') {
        alert("Please select some text to highlight.");
        return;
      }

      const range = selection.getRangeAt(0);
      const mark = document.createElement('mark');
      mark.textContent = range.toString();

      range.deleteContents();
      range.insertNode(mark);

      saveNotes();
    }

    // Auto-save notes
    function saveNotes() {
      localStorage.setItem('reviewerNotes', notesArea.innerHTML);
    }

    // Load saved notes
    function loadNotes() {
      const saved = localStorage.getItem('reviewerNotes');
      if (saved) {
        notesArea.innerHTML = saved;
      }
    }

    // Save when user stops typing (debounced)
    let timeout;
    notesArea.addEventListener('input', () => {
      clearTimeout(timeout);
      timeout = setTimeout(saveNotes, 800);
    });

    // Initialize
    window.onload = () => {
      loadNotes();
      
      // Optional: Add placeholder behavior
      if (!notesArea.innerHTML.trim()) {
        notesArea.innerHTML = '<p style="color:#999;">Start writing your notes here...<br>Select any text and use the buttons above to customize font size or highlight.</p>';
      }
    };
  </script>
</body>
</html>
