<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Sign Up | Academic Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #f8f4fa; 
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 10px;
    }

    .phone-frame {
      width: 100%; 
      max-width: 400px; 
      height: 92vh;
      background: white; 
      border-radius: 40px; 
      box-shadow: 0 25px 45px -12px rgba(78, 53, 111, 0.2);
      overflow: hidden; 
      display: flex; 
      flex-direction: column; 
      position: relative;
    }

    .screen-content {
      padding: 35px 28px;
      flex: 1;
      overflow-y: auto;
    }

    /* Brand Header */
    .logo-area { text-align: center; margin-bottom: 25px; }
    .logo-icon {
      width: 50px; height: 50px;
      background: #5E3A7E; 
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 800; font-size: 24px;
      margin: 0 auto 12px;
      box-shadow: 0 8px 16px rgba(94, 58, 126, 0.2);
    }
    .logo-text { font-size: 24px; font-weight: 800; color: #2c1e3f; letter-spacing: -0.5px; }

    h2 { text-align: center; color: #5E3A7E; margin-bottom: 20px; font-size: 20px; font-weight: 800; }

    /* Forms */
    .input-group { margin-bottom: 16px; }
    .input-label {
      display: block; font-size: 11px; font-weight: 800;
      color: #5E3A7E; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 1.2px;
    }
    .input-field {
      width: 100%; padding: 14px 18px;
      background-color: #fcfaff; border: 1px solid #B97D7E;
      border-radius: 18px; font-size: 15px; color: #2c1e3f; outline: none;
      transition: 0.2s;
    }
    .input-field:focus { border-color: #5E3A7E; background-color: #fff; box-shadow: 0 0 0 4px rgba(94, 58, 126, 0.05); }

    /* Action Button */
    .btn-primary {
      width: 100%; background: #5E3A7E; border: none; padding: 18px;
      border-radius: 22px; font-size: 16px; font-weight: 700; color: white;
      cursor: pointer; box-shadow: 0 10px 25px rgba(94, 58, 126, 0.25);
      margin: 10px 0 20px; transition: 0.3s;
    }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { background: #bcafbf; cursor: not-allowed; transform: none; }

    .login-row { text-align: center; margin-bottom: 25px; font-size: 14px; color: #5E3A7E; }
    .login-link { color: #F1A17E; font-weight: 800; text-decoration: none; margin-left: 5px; }

    .divider {
      display: flex; align-items: center; text-align: center;
      color: #B97D7E; font-size: 11px; font-weight: 700; margin-bottom: 20px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #F1A17E; }
    .divider::before { margin-right: 15px; }
    .divider::after { margin-left: 15px; }

    .social-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px;
      background: white; border: 1px solid #F1A17E; border-radius: 20px;
      padding: 15px; font-weight: 700; font-size: 14px; color: #2c1e3f; cursor: pointer;
    }

    .meta-info { text-align: center; margin-top: 30px; font-size: 11px; color: #5E3A7E; font-weight: 500; }

    /* --- Custom Modal Styles --- */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(44, 30, 63, 0.4); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-card {
      background: white; width: 85%; max-width: 320px; border-radius: 28px;
      padding: 24px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes modalPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-icon { font-size: 40px; margin-bottom: 12px; display: block; }
    .modal-title { font-weight: 800; color: #2c1e3f; margin-bottom: 8px; font-size: 18px; }
    .modal-msg { font-size: 14px; color: #5E3A7E; margin-bottom: 20px; line-height: 1.4; }
    .modal-btn {
      width: 100%; background: #5E3A7E; color: white; border: none; padding: 14px;
      border-radius: 16px; font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
      <span class="modal-icon" id="modalIcon">⚠️</span>
      <div class="modal-title" id="modalTitle">Notice</div>
      <div class="modal-msg" id="modalMsg">Message goes here.</div>
      <button class="modal-btn" id="modalClose">Continue</button>
    </div>
  </div>

  <div class="phone-frame">
    <div class="screen-content">
      <div class="logo-area">
        <div class="logo-icon">A</div>
        <div class="logo-text">Academic Portal</div>
      </div>

      <h2>Create Account</h2>

      <div class="input-group">
        <label class="input-label">Full Name</label>
        <input type="text" id="fullname" class="input-field" placeholder="Winona Vargas">
      </div>

      <div class="input-group">
        <label class="input-label">Email Address</label>
        <input type="email" id="email" class="input-field" placeholder="student@academic.edu">
      </div>

      <div class="input-group">
        <label class="input-label">Password</label>
        <input type="password" id="password" class="input-field" placeholder="••••••••">
      </div>

      <button class="btn-primary" id="registerBtn">Activate Account via Email</button>

      <div class="login-row">
        <span>Already have an account?</span>
        <a href="index.html" class="login-link">Sign In</a>
      </div>

      <div class="divider">OR REGISTER WITH</div>

      <div class="social-login">
        <div class="social-btn" id="googleBtn">
          <span class="social-icon">G</span>
          <span>Register with Google</span>
        </div>
      </div>

      <div class="meta-info">
        Secure Enrollment • Academic Tracker v2.1.0
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      sendEmailVerification,
      updateProfile,
      GoogleAuthProvider,
      signInWithPopup,
      signInWithCredential
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC-E_V2GdszTfWmDZ3bfvRWl_zvXy4OzR8",
      authDomain: "shstrackerapp.firebaseapp.com",
      projectId: "shstrackerapp",
      storageBucket: "shstrackerapp.firebasestorage.app",
      messagingSenderId: "807451936679",
      appId: "1:807451936679:web:37fa86f3b272afe9505882"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const registerBtn = document.getElementById('registerBtn');

    /* --- Modal Functionality --- */
    const modalOverlay = document.getElementById('modalOverlay');
    const modalIcon = document.getElementById('modalIcon');
    const modalTitle = document.getElementById('modalTitle');
    const modalMsg = document.getElementById('modalMsg');
    const modalClose = document.getElementById('modalClose');

    let postModalAction = null;

    function showModal(title, msg, icon = '⚠️', action = null) {
      modalTitle.innerText = title;
      modalMsg.innerText = msg;
      modalIcon.innerText = icon;
      modalOverlay.style.display = 'flex';
      postModalAction = action;
    }

    modalClose.addEventListener('click', () => {
      modalOverlay.style.display = 'none';
      if (postModalAction) postModalAction();
    });

    // Email & Password Registration Logic
    registerBtn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const fullname = document.getElementById('fullname').value.trim();

      if (!email || !password || !fullname) {
        showModal("Wait!", "Please fill in all fields to proceed.", '📋');
        return;
      }

      registerBtn.disabled = true;
      registerBtn.innerText = "Sending activation...";

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        await updateProfile(user, { displayName: fullname });
        await sendEmailVerification(user);

        showModal(
          "Success!", 
          `Account created! An activation link has been sent to ${email}. Please verify your inbox before logging in.`, 
          '✅',
          () => { window.location.href = "index.html"; }
        );

      } catch (error) {
        registerBtn.disabled = false;
        registerBtn.innerText = "Activate Account via Email";
        
        let errorMessage = "Registration failed. Please try again.";
        if (error.code === 'auth/email-already-in-use') errorMessage = "This email is already registered.";
        if (error.code === 'auth/weak-password') errorMessage = "Password should be at least 6 characters.";
        
        showModal("Error", errorMessage, '❌');
      }
    });

    // ====================== GOOGLE LOGIN (WEB + NATIVE) ======================
    document.getElementById('googleBtn').addEventListener('click', async () => {
      const provider = new GoogleAuthProvider();

      // 1. Android Native Check
      if (typeof Android !== 'undefined' && typeof Android.requestGoogleSignIn === 'function') {
        console.log("🔄 Android app detected - Requesting native Google Sign-In");
        Android.requestGoogleSignIn();
        return;
      }

      // 2. Standard Web Popup
      try {
        await signInWithPopup(auth, provider);
        window.location.href = "dashboard.html";
      } catch (error) {
        showModal("Auth Error", "Google registration failed. Please try again.", '❌');
      }
    });

    // ====================== HANDLE NATIVE ANDROID CALLBACK ======================
    window.handleNativeGoogleLogin = async (googleIdToken) => {
      if (!googleIdToken) return console.error("No token received from Android");

      try {
        const credential = GoogleAuthProvider.credential(googleIdToken);
        await signInWithCredential(auth, credential);
        
        // Redirect after short delay
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 800);
      } catch (error) {
        console.error("Native registration error:", error);
        showModal("Auth Error", "Native Google authentication failed.", '❌');
      }
    };
  </script>
</body>
</html>
