<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Sign Up | Academic Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #f8f4fa; 
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 10px;
    }

    .phone-frame {
      width: 100%; 
      max-width: 400px; 
      height: 92vh;
      background: white; 
      border-radius: 40px; 
      box-shadow: 0 25px 45px -12px rgba(78, 53, 111, 0.2);
      overflow: hidden; 
      display: flex; 
      flex-direction: column; 
      position: relative;
    }

    .screen-content {
      padding: 35px 28px;
      flex: 1;
      overflow-y: auto;
    }

    /* Brand Header */
    .logo-area { text-align: center; margin-bottom: 25px; }
    .logo-icon {
      width: 50px; height: 50px;
      background: #5E3A7E; 
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 800; font-size: 24px;
      margin: 0 auto 12px;
      box-shadow: 0 8px 16px rgba(94, 58, 126, 0.2);
    }
    .logo-text { font-size: 24px; font-weight: 800; color: #2c1e3f; letter-spacing: -0.5px; }

    h2 { text-align: center; color: #5E3A7E; margin-bottom: 20px; font-size: 20px; font-weight: 800; }

    /* Forms */
    .input-group { margin-bottom: 16px; }
    .input-label {
      display: block; font-size: 11px; font-weight: 800;
      color: #5E3A7E; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 1.2px;
    }
    .input-field {
      width: 100%; padding: 14px 18px;
      background-color: #fcfaff; border: 1px solid #B97D7E;
      border-radius: 18px; font-size: 15px; color: #2c1e3f; outline: none;
      transition: 0.2s;
    }
    .input-field:focus { border-color: #5E3A7E; background-color: #fff; box-shadow: 0 0 0 4px rgba(94, 58, 126, 0.05); }

    /* Action Button */
    .btn-primary {
      width: 100%; background: #5E3A7E; border: none; padding: 18px;
      border-radius: 22px; font-size: 16px; font-weight: 700; color: white;
      cursor: pointer; box-shadow: 0 10px 25px rgba(94, 58, 126, 0.25);
      margin: 10px 0 20px; transition: 0.3s;
    }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { background: #bcafbf; cursor: not-allowed; transform: none; }

    .login-row { text-align: center; margin-bottom: 25px; font-size: 14px; color: #5E3A7E; }
    .login-link { color: #F1A17E; font-weight: 800; text-decoration: none; margin-left: 5px; }

    .divider {
      display: flex; align-items: center; text-align: center;
      color: #B97D7E; font-size: 11px; font-weight: 700; margin-bottom: 20px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #F1A17E; }
    .divider::before { margin-right: 15px; }
    .divider::after { margin-left: 15px; }

    .social-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px;
      background: white; border: 1px solid #F1A17E; border-radius: 20px;
      padding: 15px; font-weight: 700; font-size: 14px; color: #2c1e3f; cursor: pointer;
    }

    .meta-info { text-align: center; margin-top: 30px; font-size: 11px; color: #5E3A7E; font-weight: 500; }
  </style>
</head>
<body>

  <div class="phone-frame">
    <div class="screen-content">
      <div class="logo-area">
        <div class="logo-icon">A</div>
        <div class="logo-text">Academic Portal</div>
      </div>

      <h2>Create Account</h2>

      <div class="input-group">
        <label class="input-label">Full Name</label>
        <input type="text" id="fullname" class="input-field" placeholder="Winona Vargas">
      </div>

      <div class="input-group">
        <label class="input-label">Email Address</label>
        <input type="email" id="email" class="input-field" placeholder="student@academic.edu">
      </div>

      <div class="input-group">
        <label class="input-label">Password</label>
        <input type="password" id="password" class="input-field" placeholder="••••••••">
      </div>

      <button class="btn-primary" id="registerBtn">Activate Account via Email</button>

      <div class="login-row">
        <span>Already have an account?</span>
        <a href="index.html" class="login-link">Sign In</a>
      </div>

      <div class="divider">OR REGISTER WITH</div>

      <div class="social-login">
        <div class="social-btn" id="googleBtn">
          <span class="social-icon">G</span>
          <span>Register with Google</span>
        </div>
      </div>

      <div class="meta-info">
        Secure Enrollment • Academic Tracker v2.1.0
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      sendEmailVerification,
      updateProfile,
      GoogleAuthProvider,
      signInWithPopup
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    // Your existing Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyC-E_V2GdszTfWmDZ3bfvRWl_zvXy4OzR8",
      authDomain: "shstrackerapp.firebaseapp.com",
      projectId: "shstrackerapp",
      storageBucket: "shstrackerapp.firebasestorage.app",
      messagingSenderId: "807451936679",
      appId: "1:807451936679:web:37fa86f3b272afe9505882"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const registerBtn = document.getElementById('registerBtn');

    // Email & Password Registration Logic
    registerBtn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const fullname = document.getElementById('fullname').value.trim();

      if (!email || !password || !fullname) {
        alert("Please fill in all fields.");
        return;
      }

      // UI Loading State
      registerBtn.disabled = true;
      registerBtn.innerText = "Sending activation...";

      try {
        // 1. Create User
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // 2. Set the Display Name
        await updateProfile(user, { displayName: fullname });

        // 3. Send Activation (Verification) Email
        await sendEmailVerification(user);

        alert(`✅ Account Created!\n\nAn activation link has been sent to ${email}.\n\nPlease check your inbox (and spam folder) to activate your account before logging in.`);
        
        // Move back to login
        window.location.href = "index.html";

      } catch (error) {
        registerBtn.disabled = false;
        registerBtn.innerText = "Activate Account via Email";
        
        // Handle specific errors
        switch (error.code) {
          case 'auth/email-already-in-use':
            alert("This email is already registered.");
            break;
          case 'auth/weak-password':
            alert("Password must be at least 6 characters.");
            break;
          default:
            alert("Error: " + error.message);
        }
      }
    });

    // Google Provider
    document.getElementById('googleBtn').addEventListener('click', async () => {
      const provider = new GoogleAuthProvider();
      try {
        const result = await signInWithPopup(auth, provider);
        // Google accounts are usually pre-verified
        window.location.href = "dashboard.html";
      } catch (error) {
        console.error("Google Auth Error:", error);
      }
    });
  </script>
</body>
</html>
