<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Sign Up | Academic Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #f8f4fa; /* Matches index and profile background */
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 10px;
    }

    /* Standardized Container - Matches Profile & Index */
    .phone-frame {
      width: 100%; 
      max-width: 400px; 
      height: 92vh;
      background: white; 
      border-radius: 40px; 
      box-shadow: 0 25px 45px -12px rgba(78, 53, 111, 0.2);
      overflow: hidden; 
      display: flex; 
      flex-direction: column; 
      position: relative;
    }

    .screen-content {
      padding: 35px 28px;
      flex: 1;
      overflow-y: auto;
    }

    /* Logo Styling */
    .logo-area {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo-icon {
      width: 50px;
      height: 50px;
      background: #5E3A7E; /* Purple from image */
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 24px;
      margin: 0 auto 12px;
      box-shadow: 0 8px 16px rgba(94, 58, 126, 0.2);
    }
    .logo-text {
      font-size: 24px;
      font-weight: 800;
      color: #2c1e3f;
      letter-spacing: -0.5px;
    }

    h2 {
      text-align: center; 
      color: #5E3A7E; 
      margin-bottom: 25px; 
      font-size: 22px; 
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    /* Input Styling */
    .input-group { margin-bottom: 18px; }
    .input-label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      color: #5E3A7E; /* Purple from image */
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }
    .input-field {
      width: 100%;
      padding: 14px 18px;
      background-color: #fcfaff;
      border: 1px solid #B97D7E; /* Middle tone from image */
      border-radius: 18px;
      font-size: 15px;
      color: #2c1e3f;
      outline: none;
      transition: 0.2s;
    }
    .input-field:focus {
      border-color: #5E3A7E;
      background-color: #fff;
      box-shadow: 0 0 0 4px rgba(94, 58, 126, 0.05);
    }

    /* Primary Button */
    .btn-primary {
      width: 100%;
      background: #5E3A7E; /* Purple from image */
      border: none;
      padding: 18px;
      border-radius: 22px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(94, 58, 126, 0.25);
      margin: 10px 0 20px;
      transition: 0.3s;
    }
    .btn-primary:active { transform: scale(0.97); opacity: 0.9; }

    .login-row { text-align: center; margin-bottom: 25px; font-size: 14px; color: #5E3A7E; }
    .login-link { color: #F1A17E; /* Peachy Orange from image */ font-weight: 800; text-decoration: none; margin-left: 5px; }

    .divider {
      display: flex; align-items: center; text-align: center;
      color: #B97D7E; font-size: 11px; font-weight: 700; margin-bottom: 20px;
      letter-spacing: 1px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #F1A17E; }
    .divider::before { margin-right: 15px; }
    .divider::after { margin-left: 15px; }

    /* Social Section */
    .social-login { display: flex; gap: 12px; }
    .social-btn {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: white; border: 1px solid #F1A17E; border-radius: 18px;
      padding: 14px; font-weight: 700; font-size: 14px; color: #2c1e3f; cursor: pointer;
    }
    .social-btn:active { background: #fcfaff; transform: translateY(1px); }

    .meta-info { text-align: center; margin-top: 30px; font-size: 11px; color: #5E3A7E; font-weight: 500; }
  </style>
</head>
<body>

  <div class="phone-frame">
    <div class="screen-content">
      <div class="logo-area">
        <div class="logo-icon">A</div>
        <div class="logo-text">Academic Portal</div>
      </div>

      <h2>Create Account</h2>

      <div class="input-group">
        <label class="input-label">Full Name</label>
        <input type="text" id="fullname" class="input-field" placeholder="Winona Vargas">
      </div>

      <div class="input-group">
        <label class="input-label">Username</label>
        <input type="text" id="username" class="input-field" placeholder="wina.va">
      </div>

      <div class="input-group">
        <label class="input-label">Email Address</label>
        <input type="email" id="email" class="input-field" placeholder="wina.va@academic.edu">
      </div>

      <div class="input-group">
        <label class="input-label">Password</label>
        <input type="password" id="password" class="input-field" placeholder="••••••••">
      </div>

      <div class="input-group">
        <label class="input-label">Confirm Password</label>
        <input type="password" id="confirm-password" class="input-field" placeholder="••••••••">
      </div>

      <button class="btn-primary" id="registerBtn">Register Now</button>

      <div class="login-row">
        <span>Already have an account?</span>
        <a href="index.html" class="login-link">Sign In</a>
      </div>

      <div class="divider">OR REGISTER WITH</div>

      <div class="social-login">
        <div class="social-btn" id="googleBtn">
          <span class="social-icon">G</span>
          <span>Google</span>
        </div>
        <div class="social-btn" id="appleBtn">
          <span class="social-icon"></span>
          <span>Apple</span>
        </div>
      </div>

      <div class="meta-info">
        Secure Enrollment • Academic Tracker v2.1.0
      </div>
    </div>
  </div>

  <script>
    document.getElementById('registerBtn').addEventListener('click', () => {
      const fullname = document.getElementById('fullname').value.trim();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();

      if (fullname && username && email) {
        alert(`✅ Welcome, ${fullname}!\n\nYour account has been created successfully.`);
        window.location.href = "index.html";
      } else {
        alert('Please complete all fields to continue.');
      }
    });

    document.getElementById('googleBtn').addEventListener('click', () => {
      alert('Connecting to Google Services...');
    });

    document.getElementById('appleBtn').addEventListener('click', () => {
      alert('Connecting to Apple ID...');
    });
  </script>
</body>
</html>
