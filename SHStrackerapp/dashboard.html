<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dashboard | Academic Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f8f4fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px 12px;
      overflow: hidden;
    }

    .phone-frame {
      width: 100%;
      max-width: 380px;
      height: 100vh;
      max-height: 812px;           /* Typical iPhone height */
      background: white;
      border-radius: 48px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      border: 8px solid #1a1a1a;
    }

    .status-bar {
      height: 48px;
      background: white;
      flex-shrink: 0;
    }

    .header {
      padding: 0 24px 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-shrink: 0;
    }

    .greeting {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.1;
    }

    .greeting .name {
      color: #EF9875;
    }

    .user-email {
      font-size: 15px;
      color: #666;
      margin-top: 4px;
    }

    .profile-circle {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #4E356F, #9C6A82);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(78, 53, 111, 0.3);
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 0 24px 100px;   /* Extra padding so content doesn't hide under bottom nav */
      -webkit-overflow-scrolling: touch;
    }

    /* Progress Card - Matching your image */
    .progress-card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(78, 53, 111, 0.08);
      margin-bottom: 32px;
      border: 1px solid #f0e6f5;
    }

    .progress-wrapper {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .circular-progress {
      position: relative;
      width: 110px;
      height: 110px;
    }

    .circular-progress svg {
      transform: rotate(-90deg);
    }

    .circular-progress .bg-circle {
      fill: none;
      stroke: #f0e6f5;
      stroke-width: 14;
    }

    .circular-progress .progress-circle {
      fill: none;
      stroke: #4E356F;
      stroke-width: 14;
      stroke-linecap: round;
    }

    .progress-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .progress-percentage {
      font-size: 32px;
      font-weight: 800;
      color: #2c1e3f;
    }

    .overall-text {
      font-size: 15px;
      color: #888;
      margin-top: -4px;
    }

    .performance-right {
      flex: 1;
    }

    .performance-right .label {
      font-size: 15px;
      color: #666;
    }

    .performance-right .big-number {
      font-size: 42px;
      font-weight: 800;
      color: #4E356F;
      margin: 8px 0 12px;
    }

    .progress-bar {
      height: 10px;
      background: linear-gradient(90deg, #4E356F, #EF9875);
      border-radius: 999px;
      width: 92%;
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      color: #2c1e3f;
      margin-bottom: 16px;
    }

    .subject-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .subject-card {
      background: white;
      border-radius: 20px;
      padding: 20px 18px;
      box-shadow: 0 8px 25px rgba(78, 53, 111, 0.07);
      border: 1px solid #f0e6f5;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .subject-card:active {
      transform: scale(0.96);
    }

    .subject-name {
      font-size: 17px;
      font-weight: 700;
      color: #2c1e3f;
    }

    .subject-subtitle {
      font-size: 13.5px;
      color: #888;
      margin-top: 4px;
      margin-bottom: 14px;
    }

    .subject-progress {
      height: 6px;
      background: #f0e6f5;
      border-radius: 10px;
      overflow: hidden;
    }

    .subject-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4E356F, #EF9875);
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 18px;
      box-shadow: 0 -8px 25px rgba(0, 0, 0, 0.08);
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #9C6A82;
      font-size: 11px;
      font-weight: 600;
      gap: 3px;
    }

    .nav-item.active {
      color: #4E356F;
    }

    .nav-icon {
      font-size: 26px;
    }

    /* Dropdown */
    .dropdown-content {
      display: none;
      position: absolute;
      right: 10px;
      top: 60px;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      border-radius: 16px;
      width: 190px;
      z-index: 1000;
      border: 1px solid #f0e6f5;
    }

    .dropdown-content.show {
      display: block;
    }

    .dropdown-item {
      padding: 16px 20px;
      font-size: 15px;
      cursor: pointer;
    }

    .dropdown-item:hover {
      background: #f8f4fa;
    }

    .dropdown-item.logout {
      color: #e07a5f;
      border-top: 1px solid #f0e6f5;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <!-- Status Bar -->
    <div class="status-bar"></div>

    <!-- Header -->
    <div class="header">
      <div>
        <div class="greeting">Hi, <span class="name" id="userName">Ramon III L. Raymundo</span> 👋</div>
        <div class="user-email" id="userEmail">ramonraymundo121500@gmail.com</div>
      </div>
      <div class="profile-circle" id="profileBtn">R</div>

      <!-- Dropdown -->
      <div class="dropdown-content" id="dropdownMenu">
        <div class="dropdown-item" onclick="window.location.href='profile.html'">👤 My Profile</div>
        <div class="dropdown-item" onclick="alert('Settings coming soon')">⚙️ Settings</div>
        <div class="dropdown-item logout" onclick="logout()">🚪 Logout</div>
      </div>
    </div>

    <!-- Scrollable Content -->
    <div class="main-content">
      <!-- Progress Card -->
      <div class="progress-card">
        <div class="progress-wrapper">
          <div class="circular-progress">
            <svg width="110" height="110" viewBox="0 0 110 110">
              <circle class="bg-circle" cx="55" cy="55" r="48"/>
              <circle class="progress-circle" cx="55" cy="55" r="48"
                      stroke-dasharray="301.59" stroke-dashoffset="30.16"/>
            </svg>
            <div class="progress-center">
              <div class="progress-percentage">90%</div>
              <div class="overall-text">Overall</div>
            </div>
          </div>

          <div class="performance-right">
            <div class="label">Overall Performance</div>
            <div class="big-number">90%</div>
            <div class="progress-bar"></div>
          </div>
        </div>
      </div>

      <!-- My Subjects -->
      <div class="section-title">My Subjects</div>
      <div class="subject-grid">
        <div class="subject-card" onclick="alert('Opening Mathematics...')">
          <div class="subject-name">Mathematics</div>
          <div class="subject-subtitle">Advanced Algebra</div>
          <div class="subject-progress"><div class="subject-progress-bar" style="width:92%"></div></div>
        </div>

        <div class="subject-card" onclick="alert('Opening Biology...')">
          <div class="subject-name">Biology</div>
          <div class="subject-subtitle">Human Anatomy</div>
          <div class="subject-progress"><div class="subject-progress-bar" style="width:78%"></div></div>
        </div>

        <div class="subject-card" onclick="alert('Opening English...')">
          <div class="subject-name">English</div>
          <div class="subject-subtitle">Literature & Composition</div>
          <div class="subject-progress"><div class="subject-progress-bar" style="width:95%"></div></div>
        </div>

        <div class="subject-card" onclick="alert('Opening History...')">
          <div class="subject-name">History</div>
          <div class="subject-subtitle">World Civilization</div>
          <div class="subject-progress"><div class="subject-progress-bar" style="width:65%"></div></div>
        </div>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <div class="nav-item active">
        <div class="nav-icon">🏠</div>
        <div>Home</div>
      </div>
      <div class="nav-item" onclick="window.location.href='tracker.html'">
        <div class="nav-icon">📊</div>
        <div>Tracker</div>
      </div>
      <div class="nav-item" onclick="window.location.href='reviewer.html'">
        <div class="nav-icon">📄</div>
        <div>Reviewer</div>
      </div>
      <div class="nav-item" onclick="window.location.href='profile.html'">
        <div class="nav-icon">👤</div>
        <div>Profile</div>
      </div>
    </div>
  </div>

  <!-- Firebase Script (unchanged) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC-E_V2GdszTfWmDZ3bfvRWl_zvXy4OzR8",
      authDomain: "shstrackerapp.firebaseapp.com",
      databaseURL: "https://shstrackerapp-default-rtdb.firebaseio.com",
      projectId: "shstrackerapp",
      storageBucket: "shstrackerapp.firebasestorage.app",
      messagingSenderId: "807451936679",
      appId: "1:807451936679:web:37fa86f3b272afe9505882"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        const name = user.displayName || user.email?.split('@')[0] || "Student";
        document.getElementById('userName').textContent = name;
        document.getElementById('userEmail').textContent = user.email || "";
        document.getElementById('profileBtn').textContent = name.charAt(0).toUpperCase();
      } else {
        window.location.href = "login.html";
      }
    });

    function logout() {
      if (confirm("Are you sure you want to logout?")) {
        signOut(auth).then(() => window.location.href = "login.html");
      }
    }

    // Dropdown
    const profileBtn = document.getElementById('profileBtn');
    const dropdown = document.getElementById('dropdownMenu');

    profileBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('show');
    });

    document.addEventListener('click', () => dropdown.classList.remove('show'));
  </script>
</body>
</html>
