<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Profile | Academic Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f8f4fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 10px;
    }

    .phone-frame {
      width: 100%; max-width: 400px; height: 92vh;
      background: white; border-radius: 40px;
      box-shadow: 0 25px 45px -12px rgba(78, 53, 111, 0.2);
      overflow: hidden; display: flex; flex-direction: column; position: relative;
    }

    /* CUSTOM MODAL SYSTEM */
    .modal-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(44, 30, 63, 0.4); backdrop-filter: blur(5px);
      display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal {
      width: 82%; background: white; border-radius: 28px; padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2); text-align: center;
    }
    .modal h3 { font-size: 18px; color: #2c1e3f; margin-bottom: 8px; font-weight: 800; }
    .modal p { font-size: 14px; color: #9C6A82; margin-bottom: 24px; line-height: 1.5; }
    .modal-actions { display: flex; gap: 12px; }
    .modal-btn { flex: 1; padding: 14px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; font-size: 14px; }
    .btn-cancel { background: #f8f4fa; color: #9C6A82; }
    .btn-danger { background: #e07a5f; color: white; }

    /* Header & Hero */
    .header { padding: 30px 24px 10px; display: flex; justify-content: center; background: white; }
    .header h1 { font-size: 20px; font-weight: 800; color: #2c1e3f; }

    .profile-hero { text-align: center; padding: 20px 24px 30px; background: white; }
    .profile-avatar { 
      width: 100px; height: 100px; background: #f0e6f5; color: #4E356F; 
      border-radius: 32px; margin: 0 auto 16px; display: flex; align-items: center; 
      justify-content: center; font-size: 36px; font-weight: 800; overflow: hidden; 
      border: 4px solid #fff; box-shadow: 0 12px 24px rgba(78, 53, 111, 0.12); 
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name { font-size: 22px; font-weight: 800; color: #2c1e3f; letter-spacing: -0.5px; }
    .profile-email { font-size: 14px; color: #9C6A82; margin-top: 4px; font-weight: 500; }

    /* Content Area */
    .content { flex: 1; overflow-y: auto; padding: 0 24px 110px; background: white; }
    .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 800; color: #9C6A82; margin-bottom: 12px; }
    .info-card { background: #fcfaff; border: 1px solid #f0e6f5; border-radius: 24px; padding: 8px 20px; margin-bottom: 24px; }
    
    .info-item { display: flex; flex-direction: column; padding: 16px 0; border-bottom: 1px solid #f0e6f5; }
    .info-item:last-child { border-bottom: none; }
    .info-label { font-size: 11px; font-weight: 700; color: #9C6A82; margin-bottom: 4px; }
    .info-value { font-size: 15px; font-weight: 600; color: #2c1e3f; word-break: break-all; }

    .logout-btn { 
      width: 100%; padding: 18px; background: #4E356F; color: white; border: none; 
      border-radius: 20px; font-size: 15px; font-weight: 700; cursor: pointer; 
      transition: 0.2s; box-shadow: 0 4px 12px rgba(78, 53, 111, 0.2); 
    }
    .logout-btn:active { transform: scale(0.97); opacity: 0.9; }

    /* Bottom Navigation */
    .bottom-nav { 
      position: absolute; bottom: 0; left: 0; right: 0; background: white; 
      border-top: 1px solid #f0e6f5; display: flex; justify-content: space-around; 
      padding: 12px 0 28px; 
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: #9C6A82; font-size: 11px; cursor: pointer; }
    .nav-item.active { color: #4E356F; font-weight: 700; }
    .nav-icon { font-size: 22px; margin-bottom: 4px; }
  </style>
</head>
<body>

<div class="phone-frame">
  <div class="modal-overlay" id="logoutModal">
    <div class="modal">
      <h3>Sign Out</h3>
      <p>Are you sure you want to log out of your Academic Portal account?</p>
      <div class="modal-actions">
        <button class="modal-btn btn-cancel" id="cancelBtn">No, stay</button>
        <button class="modal-btn btn-danger" id="confirmBtn">Sign Out</button>
      </div>
    </div>
  </div>

  <div class="header">
    <h1>My Profile</h1>
  </div>

  <div class="profile-hero">
    <div class="profile-avatar" id="profileAvatar">...</div>
    <div class="profile-name" id="profileName">Loading...</div>
    <div class="profile-email" id="profileEmail">...</div>
  </div>

  <div class="content">
    <p class="section-label">Account Details</p>
    <div class="info-card">
      <div class="info-item">
        <span class="info-label">Full Name</span>
        <span class="info-value" id="fullName">...</span>
      </div>
      <div class="info-item">
        <span class="info-label">User ID</span>
        <span class="info-value" id="userId" style="font-family: monospace; font-size: 12px;">...</span>
      </div>
      <div class="info-item">
        <span class="info-label">Member Since</span>
        <span class="info-value" id="createdAt">...</span>
      </div>
    </div>

    <button class="logout-btn" id="signOutTrigger">Sign Out</button>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='dashboard.html'"><div class="nav-icon">🏠</div>Home</div>
    <div class="nav-item" onclick="window.location.href='tracker.html'"><div class="nav-icon">📊</div>Tracker</div>
    <div class="nav-item" onclick="window.location.href='reviewer.html'"><div class="nav-icon">📄</div>Reviewer</div>
    <div class="nav-item active"><div class="nav-icon">👤</div>Profile</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC-E_V2GdszTfWmDZ3bfvRWl_zvXy4OzR8",
    authDomain: "shstrackerapp.firebaseapp.com",
    databaseURL: "https://shstrackerapp-default-rtdb.firebaseio.com",
    projectId: "shstrackerapp",
    storageBucket: "shstrackerapp.firebasestorage.app",
    messagingSenderId: "807451936679",
    appId: "1:807451936679:web:37fa86f3b272afe9505882"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, user => {
    if (user) {
      const name = user.displayName || user.email.split('@')[0];
      
      document.getElementById('profileAvatar').innerHTML = user.photoURL 
        ? `<img src="${user.photoURL}" alt="Profile">` 
        : name.charAt(0).toUpperCase();

      document.getElementById('profileName').textContent = name;
      document.getElementById('fullName').textContent = name;
      document.getElementById('profileEmail').textContent = user.email;
      document.getElementById('userId').textContent = user.uid;
      
      if (user.metadata.creationTime) {
        document.getElementById('createdAt').textContent = new Date(user.metadata.creationTime).toLocaleDateString('en-US', { 
          month: 'long', day: 'numeric', year: 'numeric' 
        });
      }
    } else {
      // Redirect to index if not logged in
      window.location.href = "index.html";
    }
  });

  const modal = document.getElementById('logoutModal');
  const trigger = document.getElementById('signOutTrigger');
  const cancel = document.getElementById('cancelBtn');
  const confirm = document.getElementById('confirmBtn');

  trigger.onclick = () => modal.style.display = 'flex';
  cancel.onclick = () => modal.style.display = 'none';
  
  confirm.onclick = () => {
    signOut(auth).then(() => {
      // Redirect to index after successful sign out
      window.location.href = "index.html";
    }).catch(err => {
      console.error(err);
      modal.style.display = 'none';
    });
  };

  window.onclick = (event) => {
    if (event.target == modal) modal.style.display = "none";
  }
</script>

</body>
</html>
