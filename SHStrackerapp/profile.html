<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Profile | Academic Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f8f4fa;
      color: #2c1e3f;
      min-height: 100vh;
      padding: 20px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .phone-frame {
      max-width: 380px;
      width: 100%;
      background: white;
      border-radius: 48px;
      box-shadow: 0 25px 45px -12px rgba(78, 53, 111, 0.25);
      overflow: hidden;
      height: 100vh;
      min-height: 100dvh;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      height: 44px;
      background: white;
      flex-shrink: 0;
    }
    .header {
      padding: 20px 24px 16px;
      text-align: center;
      background: linear-gradient(135deg, #4E356F, #9C6A82);
      color: white;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 700;
    }
    .profile-header {
      text-align: center;
      margin-top: -50px;
      position: relative;
      z-index: 10;
    }
    .profile-avatar {
      width: 110px;
      height: 110px;
      background: white;
      border: 6px solid white;
      border-radius: 50%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .profile-name {
      font-size: 22px;
      font-weight: 700;
      margin-top: 12px;
      color: #2c1e3f;
    }
    .profile-email {
      font-size: 15px;
      color: #6b5a7a;
      margin-top: 4px;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      padding-bottom: 100px;
    }

    .info-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 6px 15px -6px rgba(78, 53, 111, 0.15);
      border: 1.5px solid #ecdde6;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #ecdde6;
    }
    .info-item:last-child {
      border-bottom: none;
    }
    .info-label {
      font-weight: 600;
      color: #6b5a7a;
    }
    .info-value {
      font-weight: 600;
      color: #2c1e3f;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin: 30px 0 16px;
      color: #4E356F;
    }

    button {
      width: 100%;
      padding: 16px;
      background: #EF9875;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      margin-top: 30px;
      cursor: pointer;
    }

    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #e9dee4;
      box-shadow: 0 -10px 30px -10px rgba(78, 53, 111, 0.3);
      display: flex;
      justify-content: space-around;
      padding: 12px 0 22px;
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #9C6A82;
      font-size: 11px;
      font-weight: 600;
      gap: 4px;
      cursor: pointer;
    }
    .nav-item.active {
      color: #4E356F;
    }
    .nav-icon {
      font-size: 24px;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    
    <!-- Status Bar -->
    <div class="status-bar"></div>

    <!-- Header -->
    <div class="header">
      <h1>My Profile</h1>
    </div>

    <!-- Profile Header -->
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar">
        W
      </div>
      <div class="profile-name" id="profileName">Loading...</div>
      <div class="profile-email" id="profileEmail"></div>
    </div>

    <div class="content">

      <div class="section-title">Account Information</div>
      <div class="info-card">
        <div class="info-item">
          <span class="info-label">Full Name</span>
          <span class="info-value" id="fullName">Loading...</span>
        </div>
        <div class="info-item">
          <span class="info-label">Email</span>
          <span class="info-value" id="email">Loading...</span>
        </div>
        <div class="info-item">
          <span class="info-label">User ID</span>
          <span class="info-value" id="userId" style="font-size:13px; word-break:break-all;">Loading...</span>
        </div>
        <div class="info-item">
          <span class="info-label">Account Created</span>
          <span class="info-value" id="createdAt">Loading...</span>
        </div>
      </div>

      <div class="section-title">Settings</div>
      <div class="info-card">
        <div class="info-item" onclick="alert('Notification settings coming soon')">
          <span>🔔 Notifications</span>
          <span style="color:#EF9875;">→</span>
        </div>
        <div class="info-item" onclick="alert('Privacy settings coming soon')">
          <span>🔒 Privacy</span>
          <span style="color:#EF9875;">→</span>
        </div>
        <div class="info-item" onclick="alert('Language settings coming soon')">
          <span>🌐 Language</span>
          <span style="color:#EF9875;">→</span>
        </div>
      </div>

      <button onclick="logout()">Sign Out</button>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <div class="nav-item" onclick="window.location.href='dashboard.html'">
        <div class="nav-icon">🏠</div>
        <div>Home</div>
      </div>
      <div class="nav-item" onclick="window.location.href='tracker.html'">
        <div class="nav-icon">📊</div>
        <div>Tracker</div>
      </div>
      <div class="nav-item" onclick="window.location.href='reviewer.html'">
        <div class="nav-icon">📄</div>
        <div>Reviewer</div>
      </div>
      <div class="nav-item active">
        <div class="nav-icon">👤</div>
        <div>Profile</div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { 
      getAuth, 
      onAuthStateChanged, 
      signOut 
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC-E_V2GdszTfWmDZ3bfvRWl_zvXy4OzR8",
      authDomain: "shstrackerapp.firebaseapp.com",
      databaseURL: "https://shstrackerapp-default-rtdb.firebaseio.com",
      projectId: "shstrackerapp",
      storageBucket: "shstrackerapp.firebasestorage.app",
      messagingSenderId: "807451936679",
      appId: "1:807451936679:web:37fa86f3b272afe9505882",
      measurementId: "G-Y8WM86KTCG"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        const displayName = user.displayName || user.email?.split('@')[0] || "Student";

        // Update Profile Avatar
        document.getElementById('profileAvatar').innerHTML = user.photoURL 
          ? `<img src="${user.photoURL}" alt="Profile">` 
          : displayName.charAt(0).toUpperCase();

        // Update texts
        document.getElementById('profileName').textContent = displayName;
        document.getElementById('fullName').textContent = displayName;
        document.getElementById('email').textContent = user.email || "Not available";
        document.getElementById('userId').textContent = user.uid;
        document.getElementById('createdAt').textContent = user.metadata.creationTime 
          ? new Date(user.metadata.creationTime).toLocaleDateString() 
          : "Unknown";

      } else {
        // No user logged in
        window.location.href = "login.html";
      }
    });

    function logout() {
      if (confirm("Are you sure you want to sign out?")) {
        signOut(auth).then(() => {
          window.location.href = "login.html";
        }).catch((error) => {
          console.error("Logout error:", error);
          alert("Failed to sign out");
        });
      }
    }
  </script>
</body>
</html>
