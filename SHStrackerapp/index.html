<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Login | Academic Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #f8f4fa; /* Keep the existing background */
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 10px;
    }

    /* Standardized Container - Matches Profile.html */
    .phone-frame {
      width: 100%; 
      max-width: 400px; 
      height: 92vh;
      background: white; 
      border-radius: 40px; /* Matched 40px rounding */
      box-shadow: 0 25px 45px -12px rgba(78, 53, 111, 0.2);
      overflow: hidden; 
      display: flex; 
      flex-direction: column; 
      position: relative;
    }

    /* Initial hidden state to prevent flicker during Auth check */
    #mainWrapper {
      display: none; 
      flex-direction: column;
      height: 100%;
    }

    .screen-content {
      padding: 40px 28px;
      flex: 1;
      overflow-y: auto;
    }

    /* Logo Styling */
    .logo-area {
      text-align: center;
      margin-bottom: 45px;
      margin-top: 20px;
    }
    .logo-icon {
      width: 54px;
      height: 54px;
      /* logo icon color changed to purple from image */
      background: #5E3A7E; 
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 26px;
      margin: 0 auto 15px;
      /* box shadow color changed to purple from image */
      box-shadow: 0 8px 20px rgba(94, 58, 126, 0.2);
    }
    .logo-text {
      font-size: 26px;
      font-weight: 800;
      color: #2c1e3f;
      letter-spacing: -0.8px;
    }

    /* Input Styling */
    .input-group { margin-bottom: 22px; }
    .input-label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      /* label text color changed to purple from image */
      color: #5E3A7E; 
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }
    .input-field {
      width: 100%;
      padding: 16px 20px;
      background-color: #fcfaff;
      /* input border color changed to middle color from image */
      border: 1px solid #B97D7E; 
      border-radius: 20px;
      font-size: 16px;
      color: #2c1e3f;
      outline: none;
      transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .input-field:focus {
      /* border color on focus changed to purple from image */
      border-color: #5E3A7E; 
      background-color: #fff;
      /* box shadow color on focus changed to purple from image */
      box-shadow: 0 0 0 4px rgba(94, 58, 126, 0.05);
    }

    .forgot-row { text-align: right; margin-bottom: 28px; }
    .forgot-link {
      font-size: 13px;
      /* link color changed to middle color from image */
      color: #B97D7E; 
      text-decoration: none;
      font-weight: 600;
    }

    /* Primary Button */
    .btn-primary {
      width: 100%;
      /* primary button color changed to purple from image */
      background: #5E3A7E; 
      border: none;
      padding: 18px;
      border-radius: 22px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      /* box shadow color changed to purple from image */
      box-shadow: 0 10px 25px rgba(94, 58, 126, 0.25);
      margin-bottom: 24px;
      transition: 0.3s;
    }
    .btn-primary:active { transform: scale(0.97); opacity: 0.9; }

    .signup-row { text-align: center; margin-bottom: 32px; font-size: 14px; /* signup row color changed to purple from image */ color: #5E3A7E; }
    /* link color changed to peachy orange from image */
    .signup-link { color: #F1A17E; font-weight: 800; text-decoration: none; margin-left: 5px; }

    .divider {
      display: flex; align-items: center; text-align: center;
      /* divider text color changed to middle color from image */
      color: #B97D7E; font-size: 11px; font-weight: 700; margin-bottom: 28px;
      letter-spacing: 1px;
    }
    /* divider line color changed to peachy orange from image */
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #F1A17E; }
    .divider::before { margin-right: 15px; }
    .divider::after { margin-left: 15px; }

    /* Social Button */
    .social-btn {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: white; /* social border color changed to peachy orange from image */ border: 1px solid #F1A17E; border-radius: 20px;
      padding: 15px; font-weight: 700; font-size: 14px; color: #2c1e3f; cursor: pointer;
      transition: 0.2s;
    }
    .social-btn:active { background: #fcfaff; transform: translateY(1px); }
    .social-icon { font-size: 18px; font-weight: 800; }

    .meta-info { text-align: center; margin-top: 35px; font-size: 11px; /* meta info color changed to purple from image */ color: #5E3A7E; font-weight: 500; }
  </style>
</head>
<body>

  <div class="phone-frame">
    <div id="mainWrapper">
      <div class="screen-content">
        <div class="logo-area">
          <div class="logo-icon">A</div>
          <div class="logo-text">Academic Portal</div>
        </div>

        <div class="input-group">
          <label class="input-label">Username</label>
          <input type="text" id="username" class="input-field" placeholder="wina.va" value="wina.va">
        </div>
        
        <div class="input-group">
          <label class="input-label">Password</label>
          <input type="password" id="password" class="input-field" placeholder="••••••••">
        </div>
        
        <div class="forgot-row">
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>
        
        <button class="btn-primary" id="loginBtn">Login</button>

        <div class="signup-row">
          <span>New here?</span>
          <a href="register.html" class="signup-link">Create Account</a>
        </div>

        <div class="divider">OR CONTINUE WITH</div>

        <div class="social-login">
          <div class="social-btn" id="googleBtn">
            <span class="social-icon">G</span>
            <span>Sign in with Google</span>
          </div>
        </div>

        <div class="meta-info">
          Secure Academic Tracker • v2.1.0
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { 
      getAuth, 
      GoogleAuthProvider, 
      signInWithCredential,
      signInWithPopup,
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC-E_V2GdszTfWmDZ3bfvRWl_zvXy4OzR8",
      authDomain: "shstrackerapp.firebaseapp.com",
      databaseURL: "https://shstrackerapp-default-rtdb.firebaseio.com",
      projectId: "shstrackerapp",
      storageBucket: "shstrackerapp.firebasestorage.app",
      messagingSenderId: "807451936679",
      appId: "1:807451936679:web:37fa86f3b272afe9505882"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const wrapper = document.getElementById('mainWrapper');

    // ====================== AUTH GUARD & AUTO-REDIRECT ======================
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // User is logged in, skip login page
        window.location.href = "dashboard.html";
      } else {
        // No user, show the login UI
        wrapper.style.display = "flex";
      }
    });

    // ====================== Manual Login Logic ======================
    document.getElementById('loginBtn').addEventListener('click', () => {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();

      // Demo credentials check
      if (u === "wina.va" && p === "11111111") {
        window.location.href = "dashboard.html";
      } else {
        alert("Invalid credentials. Try wina.va / 11111111");
      }
    });

    // ====================== Google Login Logic ======================
    document.getElementById('googleBtn').addEventListener('click', async () => {
      // Android Native Bridge Support
      if (typeof Android !== 'undefined' && typeof Android.requestGoogleSignIn === 'function') {
        Android.requestGoogleSignIn();
        return;
      }

      try {
        await signInWithPopup(auth, provider);
        window.location.href = "dashboard.html";
      } catch (error) {
        if (error.code !== 'auth/popup-closed-by-user') {
          alert("Login failed: " + error.message);
        }
      }
    });

    // Handle Native Android Bridge Result
    window.handleNativeGoogleLogin = async (token) => {
      try {
        const credential = GoogleAuthProvider.credential(token);
        await signInWithCredential(auth, credential);
        window.location.href = "dashboard.html";
      } catch (error) {
        console.error("Native Auth Error:", error);
      }
    };
  </script>
</body>
</html>
