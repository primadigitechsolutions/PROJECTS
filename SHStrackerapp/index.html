<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Login | Academic Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #faf7fc 0%, #f3edf5 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* mobile card container */
    .phone-frame {
      max-width: 380px;
      width: 100%;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 48px;
      box-shadow: 0 25px 45px -12px rgba(78, 53, 111, 0.25), 0 4px 12px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* content padding */
    .screen-content {
      padding: 32px 24px 40px;
    }

    /* logo area */
    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-placeholder {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #4E356F 0%, #9C6A82 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 20px;
      box-shadow: 0 6px 12px -6px rgba(78, 53, 111, 0.3);
    }
    .logo-text {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(120deg, #4E356F 20%, #9C6A82 70%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    /* form group */
    .input-group {
      margin-bottom: 24px;
    }
    .input-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #4E356F;
      margin-bottom: 8px;
      letter-spacing: -0.2px;
    }
    .input-field {
      width: 100%;
      padding: 16px 18px;
      background-color: #fefafc;
      border: 1.5px solid #ecdde6;
      border-radius: 28px;
      font-size: 16px;
      font-weight: 500;
      color: #2c1e3f;
      transition: all 0.2s;
      outline: none;
      font-family: inherit;
    }
    .input-field:focus {
      border-color: #EF9875;
      box-shadow: 0 0 0 3px rgba(239, 152, 117, 0.2);
      background-color: #ffffff;
    }
    .input-field::placeholder {
      color: #c1adbb;
      font-weight: 400;
    }

    /* forgot password */
    .forgot-row {
      text-align: right;
      margin: 6px 0 28px 0;
    }
    .forgot-link {
      font-size: 13px;
      color: #9C6A82;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .forgot-link:hover {
      color: #EF9875;
      text-decoration: underline;
    }

    /* primary button */
    .btn-primary {
      width: 100%;
      background: linear-gradient(100deg, #4E356F 0%, #7a538f 100%);
      border: none;
      padding: 16px 20px;
      border-radius: 44px;
      font-size: 18px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 8px 18px -6px rgba(78, 53, 111, 0.35);
      letter-spacing: 0.3px;
      margin-bottom: 28px;
    }
    .btn-primary:active {
      transform: scale(0.97);
      background: linear-gradient(100deg, #3c2a55 0%, #684470 100%);
      box-shadow: 0 4px 10px -4px rgba(78, 53, 111, 0.4);
    }

    /* signup row */
    .signup-row {
      text-align: center;
      margin-bottom: 32px;
    }
    .signup-text {
      color: #6b5a7a;
      font-size: 15px;
      font-weight: 500;
    }
    .signup-link {
      color: #EF9875;
      font-weight: 700;
      text-decoration: none;
      margin-left: 6px;
      transition: all 0.2s;
    }
    .signup-link:hover {
      color: #4E356F;
      text-decoration: underline;
    }

    /* divider */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: #bcabb9;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 28px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #e9dee4;
    }
    .divider::before {
      margin-right: 14px;
    }
    .divider::after {
      margin-left: 14px;
    }

    /* social login buttons */
    .social-login {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #ffffff;
      border: 1.5px solid #ecdde6;
      border-radius: 48px;
      padding: 12px 0;
      font-weight: 600;
      font-size: 14px;
      color: #4E356F;
      cursor: pointer;
      transition: all 0.2s;
      background-color: #fefafc;
    }
    .social-btn:active {
      background-color: #f7eef3;
      transform: scale(0.96);
      border-color: #EF9875;
    }
    .social-icon {
      font-size: 20px;
      font-weight: 600;
    }

    /* bottom hint (optional) */
    .meta-info {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: #bcafbf;
    }

    /* adjust spacing for mobile */
    @media (max-width: 450px) {
      .screen-content {
        padding: 28px 20px 36px;
      }
      .btn-primary {
        padding: 14px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="screen-content">
      <!-- Logo section -->
      <div class="logo-area">
        <div class="logo-placeholder">
          <div class="logo-icon">A</div>
          <span class="logo-text">Academi</span>
        </div>
      </div>

      <!-- Login form -->
      <div class="input-group">
        <label class="input-label" for="username">Username</label>
        <input type="text" id="username" class="input-field" placeholder="wina.va" value="wina.va">
      </div>

      <div class="input-group">
        <label class="input-label" for="password">Password</label>
        <input type="password" id="password" class="input-field" placeholder="••••••••">
      </div>

      <div class="forgot-row">
        <a href="#" class="forgot-link">Forgot Password?</a>
      </div>

      <button class="btn-primary" id="loginBtn">Login</button>

      <div class="signup-row">
        <span class="signup-text">Don't have an account?</span>
        <a href="#" class="signup-link" id="signupTrigger">SignUp</a>
      </div>

      <div class="divider">or</div>

      <div class="social-login">
        <div class="social-btn" id="googleBtn">
          <span class="social-icon">G</span>
          <span>Google</span>
        </div>
        <div class="social-btn" id="appleBtn">
          <span class="social-icon"></span>
          <span>Apple</span>
        </div>
      </div>
      <div class="meta-info">
        Secure login · Academic Tracker
      </div>
    </div>
  </div>

  <!-- simple demo interactions (non-functional alerts for demonstration) -->
  <script>
    document.getElementById('loginBtn').addEventListener('click', () => {
      alert('Demo: Login attempt (connected to Academic Tracker)');
    });
    document.getElementById('signupTrigger').addEventListener('click', (e) => {
      e.preventDefault();
      alert('SignUp flow — create new account');
    });
    document.getElementById('googleBtn').addEventListener('click', () => {
      alert('Social login: Google (demo)');
    });
    document.getElementById('appleBtn').addEventListener('click', () => {
      alert('Social login: Apple ID (demo)');
    });
    // optional: forgot password interaction
    document.querySelector('.forgot-link').addEventListener('click', (e) => {
      e.preventDefault();
      alert('Password reset link sent to registered email');
    });
  </script>
</body>
</html>
